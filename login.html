<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Bovi Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at 20% 50%, #0e1f1a 0%, #050b09 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      border: 1px solid rgba(31,163,122,.25);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      width: 100%;
      max-width: 450px;
      padding: 40px;
      backdrop-filter: blur(14px);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
      border-bottom: 2px solid rgba(31,163,122,.2);
      padding-bottom: 20px;
    }

    .login-header h1 {
      color: #1fa37a;
      font-size: 28px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .login-header p {
      color: #7cf0c2;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #7cf0c2;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(31,163,122,.3);
      background: rgba(255,255,255,.08);
      border-radius: 8px;
      font-size: 14px;
      color: #e5f3ee;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: #5fa39c;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #1fa37a;
      background: rgba(31,163,122,.15);
      box-shadow: 0 0 0 3px rgba(31,163,122,.1);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(145deg, rgba(31,163,122,.3), rgba(31,163,122,.15));
      color: #7cf0c2;
      border: 1px solid rgba(31,163,122,.3);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-login:hover {
      background: linear-gradient(145deg, rgba(31,163,122,.4), rgba(31,163,122,.25));
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(31,163,122,.2);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .erro {
      background: rgba(220,53,69,.15);
      border: 1px solid rgba(220,53,69,.3);
      color: #ff6b6b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 13px;
    }

    .sucesso {
      background: rgba(31,163,122,.15);
      border: 1px solid rgba(31,163,122,.3);
      color: #7cf0c2;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 13px;
    }

    .loading {
      display: none;
      text-align: center;
      color: #7cf0c2;
      font-size: 13px;
      margin-top: 12px;
    }

    .loading.ativo {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(31,163,122,.2);
      border-top: 2px solid #1fa37a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      color: #5fa39c;
      font-size: 12px;
      border-top: 1px solid rgba(31,163,122,.2);
      padding-top: 15px;
    }

    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .login-container {
        padding: 30px 20px;
        border-radius: 16px;
        max-width: 100%;
      }

      .login-header h1 {
        font-size: 24px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      input[type="text"],
      input[type="password"] {
        padding: 11px;
        font-size: 16px;
      }

      .btn-login {
        padding: 11px;
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .login-container {
        padding: 25px 15px;
        border-radius: 12px;
      }

      .login-header {
        margin-bottom: 25px;
      }

      .login-header h1 {
        font-size: 22px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      input[type="text"],
      input[type="password"] {
        padding: 10px;
        font-size: 16px;
      }

      .btn-login {
        padding: 10px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <h1>🐄 Bovi Premium</h1>
    <p>Sistema de Gestão Empresarial</p>
  </div>

  <div class="erro" id="erro"></div>
  <div class="sucesso" id="sucesso"></div>

  <form id="formLogin">
    <div class="form-group">
      <label for="login">Usuário</label>
      <input type="text" id="login" placeholder="Digite seu login" required>
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha" required>
    </div>

    <button type="submit" class="btn-login" id="btnLogin">Entrar</button>

    <div class="loading" id="loading">
      <span class="spinner"></span>
      <span>Validando credenciais...</span>
    </div>
  </form>

  <div class="footer">
    <p>Bovi Premium © 2026 | Sistema Seguro</p>
  </div>
</div>

<script src="config.js"></script>
<script src="auth-utils.js"></script>
<script src="login.js"></script>
</body>
</html>
