<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="sidebar-dock.css">
  <title>Relatório de Rentabilidade - Vendedor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at 20% 50%, #0e1f1a 0%, #050b09 100%);
      min-height: 100vh;
      color: #e5f3ee;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, rgba(31,163,122,.15), rgba(212,175,55,.08));
      border: 1px solid rgba(31,163,122,.25);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      backdrop-filter: blur(14px);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      color: #1fa37a;
      font-size: 28px;
      font-weight: 700;
    }

    .btn {
      background: linear-gradient(145deg, rgba(31,163,122,.3), rgba(31,163,122,.15));
      color: #7cf0c2;
      border: 1px solid rgba(31,163,122,.3);
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn:hover {
      background: linear-gradient(145deg, rgba(31,163,122,.4), rgba(31,163,122,.25));
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(31,163,122,.2);
    }

    /* RELATÓRIO */
    .relatorio-section {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(14px);
      margin-bottom: 30px;
    }

    .relatorio-section h2 {
      color: #d4af37;
      margin-bottom: 20px;
      font-size: 18px;
    }

    /* TABELA COMPARATIVA */
    .tabela-comparativa {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    .tabela-comparativa thead {
      background: rgba(31,163,122,.15);
      border-bottom: 2px solid rgba(31,163,122,.3);
    }

    .tabela-comparativa th {
      color: #1fa37a;
      padding: 15px;
      text-align: left;
      font-weight: 600;
      border: 1px solid rgba(31,163,122,.2);
    }

    .tabela-comparativa td {
      padding: 12px 15px;
      border: 1px solid rgba(255,255,255,.1);
    }

    .tabela-comparativa tbody tr:hover {
      background: rgba(31,163,122,.1);
    }

    .valor {
      text-align: right;
      font-weight: 600;
    }

    .positivo {
      color: #7cf0c2;
    }

    .negativo {
      color: #ff6b6b;
    }

    .alerta {
      color: #ffa500;
    }

    /* LAUDO */
    .laudo {
      background: rgba(31,163,122,.1);
      border-left: 4px solid #1fa37a;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
      line-height: 1.8;
    }

    .laudo-titulo {
      color: #d4af37;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .laudo-item {
      margin: 10px 0;
      padding-left: 20px;
    }

    .chart-container {
      position: relative;
      height: 300px;
      margin-bottom: 30px;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 20px;
      }

      .tabela-comparativa {
        font-size: 12px;
      }

      .tabela-comparativa th, .tabela-comparativa td {
        padding: 8px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1 id="headerTitle">📊 Relatório de Rentabilidade</h1>
    <button class="btn" onclick="window.history.back()">← Voltar</button>
  </div>

  <!-- FILTROS -->
  <div class="relatorio-section">
    <h2>🔍 Filtros</h2>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
      <div>
        <label style="color: #8fb9ac; font-size: 12px; display: block; margin-bottom: 5px;">Mês:</label>
        <select id="filtroMes" style="width: 100%; padding: 8px; background: rgba(31,163,122,.15); color: #7cf0c2; border: 1px solid rgba(31,163,122,.3); border-radius: 6px;">
          <option value="">-- Todos os meses --</option>
          <option value="1">Janeiro</option>
          <option value="2">Fevereiro</option>
          <option value="3">Março</option>
          <option value="4">Abril</option>
          <option value="5">Maio</option>
          <option value="6">Junho</option>
          <option value="7">Julho</option>
          <option value="8">Agosto</option>
          <option value="9">Setembro</option>
          <option value="10">Outubro</option>
          <option value="11">Novembro</option>
          <option value="12">Dezembro</option>
        </select>
      </div>
      <div>
        <label style="color: #8fb9ac; font-size: 12px; display: block; margin-bottom: 5px;">Ano:</label>
        <select id="filtroAno" style="width: 100%; padding: 8px; background: rgba(31,163,122,.15); color: #7cf0c2; border: 1px solid rgba(31,163,122,.3); border-radius: 6px;">
          <option value="">-- Todos os anos --</option>
          <option value="2023">2023</option>
          <option value="2024">2024</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
        </select>
      </div>
      <div style="display: flex; align-items: flex-end;">
        <button class="btn" onclick="aplicarFiltros()" style="width: 100%;">🔍 Filtrar</button>
      </div>
    </div>
  </div>
    <h2>📈 Rentabilidade por Venda</h2>
    <div class="chart-container">
      <canvas id="chartRentabilidade"></canvas>
    </div>
  </div>

  <!-- TABELA COMPARATIVA -->
  <div class="relatorio-section">
    <h2>📋 Detalhamento de Vendas</h2>
    <div style="margin-bottom: 15px;">
      <label style="color: #8fb9ac;">Imposto (Simples Nacional %):</label>
      <input type="number" id="impostoPercentual" value="10" min="0" max="100" style="width: 100px; padding: 8px; background: rgba(31,163,122,.15); color: #7cf0c2; border: 1px solid rgba(31,163,122,.3); border-radius: 6px; margin-left: 10px;">
    </div>
    <table class="tabela-comparativa">
      <thead>
        <tr>
          <th>Data</th>
          <th>Cliente</th>
          <th style="text-align: right;">Venda</th>
          <th style="text-align: right;">Imposto</th>
          <th style="text-align: right;">Frete</th>
          <th style="text-align: right;">Custo</th>
          <th style="text-align: right;">Lucro</th>
          <th style="text-align: right;">Recebido</th>
          <th style="text-align: right;">Falta</th>
          <th style="text-align: center;">Dias Atraso</th>
          <th style="text-align: center;">Status</th>
        </tr>
      </thead>
      <tbody id="corpoRelatorio">
        <tr><td colspan="11" style="text-align: center; padding: 30px;">Carregando...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- LAUDO FINAL -->
  <div class="relatorio-section">
    <h2>🎯 Laudo Analítico</h2>
    <div id="laudoFinal" class="laudo">
      <p>Análise em andamento...</p>
    </div>
  </div>

  <!-- RECOMENDAÇÃO -->
  <div class="relatorio-section">
    <h2>💡 Recomendação</h2>
    <div id="recomendacao" class="laudo">
      <p>Aguardando análise...</p>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="auth-utils.js"></script>
<script src="auth.js"></script>
<script>
  let vendedorSelecionado = '';
  let chartRentabilidade = null;
  let todasVendas = [];
  let receitas = {};
  let transportes = [];

  function getUrlParameter(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  document.addEventListener('DOMContentLoaded', async () => {
    vendedorSelecionado = getUrlParameter('vendedor') || 'DESCONHECIDO';
    document.getElementById('headerTitle').textContent = `📊 Relatório de Rentabilidade - ${vendedorSelecionado}`;
    
    await carregarDados();
    aplicarFiltros();
  });

  // Função para extrair custo real de um produto
  function calcularCustoProduto(nomeProduto, receitas) {
    if (!receitas[nomeProduto]) return 0;
    
    const receita = receitas[nomeProduto];
    let custoTotal = 0;
    
    if (receita.Ingredientes && Array.isArray(receita.Ingredientes)) {
      receita.Ingredientes.forEach(ingrediente => {
        const custoPorUnidade = (ingrediente.CustoPorKg || 0) * (ingrediente.Quantidade || 0);
        custoTotal += custoPorUnidade;
      });
    }
    
    return custoTotal;
  }

  // Função para buscar frete do cliente
  function buscarFreteCliente(nomeCliente, nf, transportes) {
    const transporte = transportes.find(t => 
      (t.NomeCliente || '').toUpperCase().includes(nomeCliente.toUpperCase()) && 
      t.NumeroNF === nf
    );
    return transporte ? transporte.ValorFrete : 0;
  }

  async function carregarDados() {
    try {
      console.log('📥 Carregando dados completos...');
      
      // Carregar clientes
      const clientes = await buscarArquivo("clientes.json");
      const todosClientes = Array.isArray(clientes) ? clientes : (clientes.dados || []);

      // Carregar receitas (custos dos produtos)
      const receitasData = await buscarArquivo("receitas.json");
      const receitasArray = Array.isArray(receitasData) ? receitasData : (receitasData.dados || []);
      receitas = {};
      receitasArray.forEach(r => {
        receitas[r.Nome] = r;
      });

      // Carregar transportes (fretes)
      const transportesData = await buscarArquivo("transporte.json");
      transportes = Array.isArray(transportesData) ? transportesData : (transportesData.dados || []);

      // Extrair vendas do vendedor
      todasVendas = [];
      todosClientes.forEach(cliente => {
        if (cliente.Vendedor === vendedorSelecionado && cliente.Vendas) {
          cliente.Vendas.forEach(venda => {
            // Calcular custo real dos produtos
            let custoRealProdutos = 0;
            if (venda.Produtos && Array.isArray(venda.Produtos)) {
              venda.Produtos.forEach(produto => {
                custoRealProdutos += calcularCustoProduto(produto.Nome, receitas);
              });
            }

            // Buscar frete
            const frete = buscarFreteCliente(cliente.Nome, venda.NumeroNF, transportes);

            // Calcular totais de Parcelas
            let totalPago = 0;
            let totalPendente = 0;
            const parcelas = venda.Parcelas || [];
            let diasAtraso = 0;
            let dataUltimaPendente = null;

            parcelas.forEach(parcela => {
              if (parcela.Pago === true) {
                totalPago += parcela.Valor || 0;
              } else {
                totalPendente += parcela.Valor || 0;
                if (!dataUltimaPendente || new Date(parcela.DataVencimento) > new Date(dataUltimaPendente)) {
                  dataUltimaPendente = parcela.DataVencimento;
                }
              }
            });

            // Calcular dias em atraso
            if (dataUltimaPendente) {
              const hoje = new Date();
              const vencimento = new Date(dataUltimaPendente);
              diasAtraso = Math.max(0, Math.floor((hoje - vencimento) / (1000 * 60 * 60 * 24)));
            }

            todasVendas.push({
              nomeCliente: cliente.Nome,
              dataVenda: venda.DataVenda,
              nf: venda.NumeroNF,
              valorVenda: venda.ValorTotal || 0,
              custoRealProdutos: custoRealProdutos,
              frete: frete,
              totalPago: totalPago,
              totalPendente: totalPendente,
              diasAtraso: diasAtraso,
              dataUltimaPendente: dataUltimaPendente,
              parcelas: parcelas
            });
          });
        }
      });

      console.log(`✅ Carregadas ${todasVendas.length} vendas com dados reais`);
    } catch (erro) {
      console.error('❌ Erro:', erro);
      document.getElementById('corpoRelatorio').innerHTML = `<tr><td colspan="11">❌ Erro ao carregar dados</td></tr>`;
    }
  }

  function aplicarFiltros() {
    const mes = document.getElementById('filtroMes').value;
    const ano = document.getElementById('filtroAno').value;
    const impostoPercentual = parseFloat(document.getElementById('impostoPercentual').value) || 10;

    let vendasFiltradas = todasVendas.filter(v => {
      const data = new Date(v.dataVenda);
      const mesVenda = data.getMonth() + 1;
      const anoVenda = data.getFullYear();

      const filtroMes = !mes || mesVenda === parseInt(mes);
      const filtroAno = !ano || anoVenda === parseInt(ano);

      return filtroMes && filtroAno;
    });

    renderizarRelatorio(vendasFiltradas, impostoPercentual);
    renderizarLaudo(vendasFiltradas, impostoPercentual);
  }

  function renderizarRelatorio(vendas, impostoPercentual) {
    const corpoRelatorio = document.getElementById('corpoRelatorio');
    
    if (vendas.length === 0) {
      corpoRelatorio.innerHTML = '<tr><td colspan="11" style="text-align: center; padding: 30px;">Nenhuma venda encontrada</td></tr>';
      return;
    }

    corpoRelatorio.innerHTML = vendas.map(v => {
      const imposto = (v.valorVenda * impostoPercentual) / 100;
      const custoTotal = v.custoRealProdutos + imposto + v.frete;
      const lucroLiquido = v.valorVenda - custoTotal;
      const statusClass = v.totalPendente === 0 ? 'positivo' : (v.diasAtraso > 0 ? 'negativo' : 'alerta');
      const statusTexto = v.totalPendente === 0 ? '✅ Completo' : (v.diasAtraso > 0 ? `🔴 ${v.diasAtraso}d atraso` : '⏳ Pendente');

      return `
        <tr>
          <td>${new Date(v.dataVenda).toLocaleDateString('pt-BR')}</td>
          <td>${v.nomeCliente.substring(0, 30)}</td>
          <td class="valor positivo">R$ ${v.valorVenda.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
          <td class="valor">R$ ${imposto.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
          <td class="valor">R$ ${v.frete.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
          <td class="valor">R$ ${v.custoRealProdutos.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
          <td class="valor ${lucroLiquido > 0 ? 'positivo' : 'negativo'}">R$ ${lucroLiquido.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
          <td class="valor positivo">R$ ${v.totalPago.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
          <td class="valor ${v.totalPendente > 0 ? 'negativo' : 'positivo'}">R$ ${v.totalPendente.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
          <td style="text-align: center;" class="${v.diasAtraso > 0 ? 'negativo' : 'positivo'}">${v.diasAtraso} dias</td>
          <td style="text-align: center;" class="${statusClass}">${statusTexto}</td>
        </tr>
      `;
    }).join('');

    // Renderizar gráfico
    renderizarGrafico(vendas, impostoPercentual);
  }

  function renderizarGrafico(vendas, impostoPercentual) {
    const labels = vendas.map(v => `${v.nomeCliente.substring(0, 12)}...`);
    const lucros = vendas.map(v => {
      const imposto = (v.valorVenda * impostoPercentual) / 100;
      const custoTotal = v.custoRealProdutos + imposto + v.frete;
      return v.valorVenda - custoTotal;
    });

    const ctx = document.getElementById('chartRentabilidade').getContext('2d');
    if (chartRentabilidade) chartRentabilidade.destroy();

    chartRentabilidade = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Lucro Líquido',
          data: lucros,
          backgroundColor: lucros.map(l => l > 0 ? 'rgba(31,163,122,0.6)' : 'rgba(255,107,107,0.6)'),
          borderColor: lucros.map(l => l > 0 ? '#1fa37a' : '#ff6b6b'),
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#7cf0c2' } }
        },
        scales: {
          y: {
            ticks: { color: '#7cf0c2' },
            grid: { color: 'rgba(31,163,122,0.1)' }
          },
          x: {
            ticks: { color: '#7cf0c2' },
            grid: { color: 'rgba(31,163,122,0.1)' }
          }
        }
      }
    });
  }

  function renderizarLaudo(vendas, impostoPercentual) {
    if (vendas.length === 0) return;

    // Calcular totais com dados REAIS
    const totalVendas = vendas.reduce((sum, v) => sum + v.valorVenda, 0);
    const totalImposto = vendas.reduce((sum, v) => sum + ((v.valorVenda * impostoPercentual) / 100), 0);
    const totalFrete = vendas.reduce((sum, v) => sum + v.frete, 0);
    const totalCustoProdutos = vendas.reduce((sum, v) => sum + v.custoRealProdutos, 0);
    const totalCustos = totalCustoProdutos + totalImposto + totalFrete;
    const totalLucroLiquido = totalVendas - totalCustos;
    const totalRecebido = vendas.reduce((sum, v) => sum + v.totalPago, 0);
    const totalPendente = vendas.reduce((sum, v) => sum + v.totalPendente, 0);
    const margemLucro = (totalLucroLiquido / totalVendas) * 100;
    const percentualRecebimento = (totalRecebido / totalVendas) * 100;

    // Vendas com atraso
    const vendasAtraso = vendas.filter(v => v.diasAtraso > 0);
    const diasMedioAtraso = vendasAtraso.length > 0 ? Math.round(vendasAtraso.reduce((sum, v) => sum + v.diasAtraso, 0) / vendasAtraso.length) : 0;

    // Melhor e pior venda
    const melhorVenda = vendas.reduce((max, v) => {
      const lucroMax = (max.valorVenda * (100 - impostoPercentual)) / 100 - max.custoRealProdutos - max.frete;
      const lucroV = (v.valorVenda * (100 - impostoPercentual)) / 100 - v.custoRealProdutos - v.frete;
      return lucroV > lucroMax ? v : max;
    });
    
    const piorVenda = vendas.reduce((min, v) => {
      const lucroMin = (min.valorVenda * (100 - impostoPercentual)) / 100 - min.custoRealProdutos - min.frete;
      const lucroV = (v.valorVenda * (100 - impostoPercentual)) / 100 - v.custoRealProdutos - v.frete;
      return lucroV < lucroMin ? v : min;
    });

    const laudoHTML = `
      <div class="laudo-titulo">📊 ANÁLISE DETALHADA COM DADOS REAIS</div>
      <div class="laudo-item">
        <strong>Total de Vendas:</strong> ${vendas.length} transações | R$ ${totalVendas.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
      </div>
      <div class="laudo-item">
        <strong>Custo de Produtos:</strong> R$ ${totalCustoProdutos.toLocaleString('pt-BR', {minimumFractionDigits: 2})} (extraído de receitas.json)
      </div>
      <div class="laudo-item">
        <strong>Impostos (${impostoPercentual}%):</strong> R$ ${totalImposto.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
      </div>
      <div class="laudo-item">
        <strong>Fretes:</strong> R$ ${totalFrete.toLocaleString('pt-BR', {minimumFractionDigits: 2})} (extraído de transporte.json)
      </div>
      <div class="laudo-item">
        <strong>Total de Custos:</strong> R$ ${totalCustos.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
      </div>
      <div class="laudo-item">
        <strong>Lucro Líquido Total:</strong> <span class="${totalLucroLiquido > 0 ? 'positivo' : 'negativo'}">R$ ${totalLucroLiquido.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span> | Margem: ${margemLucro.toFixed(1)}%
      </div>
      <div class="laudo-item">
        <strong>Total Recebido:</strong> <span class="positivo">R$ ${totalRecebido.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span> | ${percentualRecebimento.toFixed(1)}% do faturado
      </div>
      <div class="laudo-item">
        <strong>Total Pendente:</strong> <span class="negativo">R$ ${totalPendente.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span> | ${(100 - percentualRecebimento).toFixed(1)}% em aberto
      </div>

      <div style="margin-top: 20px; border-top: 1px solid rgba(31,163,122,.3); padding-top: 20px;">
        <div class="laudo-titulo">🎯 MELHORES E PIORES DESEMPENHOS</div>
        <div class="laudo-item">
          <strong>✅ Melhor Venda:</strong> ${melhorVenda.nomeCliente} (NF ${melhorVenda.nf}) - Lucro: R$ ${((melhorVenda.valorVenda * (100 - impostoPercentual)) / 100 - melhorVenda.custoRealProdutos - melhorVenda.frete).toLocaleString('pt-BR', {minimumFractionDigits: 2})}
        </div>
        <div class="laudo-item">
          <strong>❌ Pior Venda:</strong> ${piorVenda.nomeCliente} (NF ${piorVenda.nf}) - Lucro: R$ ${((piorVenda.valorVenda * (100 - impostoPercentual)) / 100 - piorVenda.custoRealProdutos - piorVenda.frete).toLocaleString('pt-BR', {minimumFractionDigits: 2})}
        </div>
      </div>

      ${vendasAtraso.length > 0 ? `
        <div style="margin-top: 20px; border-top: 1px solid rgba(31,163,122,.3); padding-top: 20px;">
          <div class="laudo-titulo">⚠️ VENDAS EM ATRASO (${impostoPercentual}% de imposto)</div>
          <div class="laudo-item">
            <strong>Quantidade em Atraso:</strong> ${vendasAtraso.length} venda(s) | Média de atraso: ${diasMedioAtraso} dias
          </div>
          <div class="laudo-item">
            <strong>Valor Bloqueado:</strong> R$ ${vendasAtraso.reduce((sum, v) => sum + v.totalPendente, 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}
          </div>
        </div>
      ` : ''}
    `;

    document.getElementById('laudoFinal').innerHTML = laudoHTML;

    // Recomendação
    let recomendacao = '<div class="laudo-titulo">💡 RECOMENDAÇÃO ESTRATÉGICA</div>';
    
    if (percentualRecebimento < 70) {
      recomendacao += '<div class="laudo-item negativo"><strong>⚠️ ALERTA DE CRÉDITO:</strong> Taxa de recebimento abaixo de 70%. Recomenda-se revisar a política de crédito e intensificar cobrança.</div>';
    }
    
    if (vendasAtraso.length > 0) {
      recomendacao += `<div class="laudo-item negativo"><strong>🔴 ${vendasAtraso.length} VENDA(S) VENCIDA(S):</strong> Total de R$ ${vendasAtraso.reduce((sum, v) => sum + v.totalPendente, 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})} em atraso há média de ${diasMedioAtraso} dias. Ação imediata recomendada.</div>`;
    }

    if (margemLucro < 15) {
      recomendacao += '<div class="laudo-item negativo"><strong>📊 MARGEM CRÍTICA:</strong> Margem de lucro abaixo de 15%. Revisar urgentemente preços, custos ou composição de vendas.</div>';
    } else if (margemLucro < 30) {
      recomendacao += '<div class="laudo-item alerta"><strong>📊 MARGEM BAIXA:</strong> Margem entre 15-30%. Considere rever preços ou reduzir custos operacionais.</div>';
    } else if (margemLucro >= 40) {
      recomendacao += '<div class="laudo-item positivo"><strong>✅ EXCELENTE MARGEM:</strong> Margem de lucro acima de 40%. Continue mantendo essa performance!</div>';
    }

    if (percentualRecebimento >= 90 && margemLucro >= 35) {
      recomendacao += '<div class="laudo-item positivo"><strong>🏆 DESEMPENHO PREMIUM:</strong> Alto recebimento (${percentualRecebimento.toFixed(1)}%) + excelente margem (${margemLucro.toFixed(1)}%). Ótimo trabalho!</div>';
    }

    document.getElementById('recomendacao').innerHTML = recomendacao;
  }
</script>

</body>
