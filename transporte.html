<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="sidebar-dock.css">
   <link rel="icon" type="image/png" href="assets/img/logo.png">
  <title>Transporte & Rastreamento Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at 20% 50%, #0e1f1a 0%, #050b09 100%);
      min-height: 100vh;
      color: #e5f3ee;
      padding: 20px;
    }

    .header {
      background: linear-gradient(135deg, rgba(31,163,122,.15), rgba(212,175,55,.08));
      border: 1px solid rgba(31,163,122,.25);
      border-radius: 20px;
      padding: 20px 30px;
      margin-bottom: 30px;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 40px rgba(0,0,0,.45);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      color: #1fa37a;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      background: linear-gradient(145deg, rgba(31,163,122,.3), rgba(31,163,122,.15));
      color: #7cf0c2;
      border: 1px solid rgba(31,163,122,.3);
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
    }

    .btn:hover {
      background: linear-gradient(145deg, rgba(31,163,122,.4), rgba(31,163,122,.25));
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(31,163,122,.2);
    }

    .btn-adicionar {
      background: linear-gradient(145deg, rgba(212,175,55,.3), rgba(212,175,55,.15));
      color: #d4af37;
      border-color: rgba(212,175,55,.3);
    }

    .btn-adicionar:hover {
      background: linear-gradient(145deg, rgba(212,175,55,.4), rgba(212,175,55,.25));
      box-shadow: 0 10px 20px rgba(212,175,55,.2);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ============ FILTROS ============ */
    .filtros-section {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border: 1px solid rgba(31,163,122,.25);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      backdrop-filter: blur(14px);
    }

    .filtros-section h3 {
      color: #7cf0c2;
      margin-bottom: 15px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filtros-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      color: #8fb9ac;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .input-group input,
    .input-group select {
      background: rgba(15,42,34,.5);
      border: 1px solid rgba(31,163,122,.2);
      color: #e5f3ee;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
    }

    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: rgba(31,163,122,.4);
      background: rgba(15,42,34,.7);
      box-shadow: 0 0 12px rgba(31,163,122,.2);
    }

    /* ============ TABELA ============ */
    table {
      width: 100%;
      border-collapse: collapse;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
      border: 1px solid rgba(31,163,122,.15);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,.25);
    }

    thead {
      background: linear-gradient(180deg, rgba(31,163,122,.15), rgba(31,163,122,.08));
      border-bottom: 1px solid rgba(31,163,122,.2);
    }

    th {
      color: #7cf0c2;
      padding: 15px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    tbody tr {
      border-bottom: 1px solid rgba(31,163,122,.1);
      transition: all 0.3s;
    }

    tbody tr:hover {
      background: rgba(31,163,122,.1);
    }

    td {
      padding: 15px;
      font-size: 13px;
      color: #b9d8ce;
    }

    /* ============ STATUS BADGE ============ */
    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid;
    }

    .status-badge:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .status-entregue {
      background: linear-gradient(145deg, rgba(50,200,50,.3), rgba(50,200,50,.15));
      color: #32c832;
      border-color: rgba(50,200,50,.3);
    }

    .status-entregue:hover {
      background: linear-gradient(145deg, rgba(50,200,50,.4), rgba(50,200,50,.25));
      border-color: rgba(50,200,50,.5);
    }

    .status-pendente {
      background: linear-gradient(145deg, rgba(255,200,0,.3), rgba(255,200,0,.15));
      color: #ffc107;
      border-color: rgba(255,200,0,.3);
    }

    .status-pendente:hover {
      background: linear-gradient(145deg, rgba(255,200,0,.4), rgba(255,200,0,.25));
      border-color: rgba(255,200,0,.5);
    }

    /* ============ LOADING SPINNER ============ */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }

    .loading-overlay.ativo {
      display: flex;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(31, 163, 122, 0.3);
      border-top: 4px solid #1fa37a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ============ AÇÕES ============ */
    .acoes {
      display: flex;
      gap: 8px;
    }

    .btn-acao {
      background: linear-gradient(145deg, rgba(31,163,122,.25), rgba(31,163,122,.1));
      border: 1px solid rgba(31,163,122,.2);
      color: #7cf0c2;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-acao:hover {
      background: linear-gradient(145deg, rgba(31,163,122,.35), rgba(31,163,122,.2));
      box-shadow: 0 6px 12px rgba(31,163,122,.15);
    }

    .btn-deletar {
      background: linear-gradient(145deg, rgba(255,107,107,.25), rgba(255,107,107,.1));
      border-color: rgba(255,107,107,.2);
      color: #ff6b6b;
    }

    .btn-deletar:hover {
      background: linear-gradient(145deg, rgba(255,107,107,.35), rgba(255,107,107,.2));
      box-shadow: 0 6px 12px rgba(255,107,107,.15);
    }

    /* ============ MODAL ============ */
        /* --- COLOQUE AQUI (Autocomplete) --- */
    .autocomplete-suggestions {
      position: absolute;
      background: #0f2a22;
      border: 1px solid rgba(31,163,122,0.3);
      border-top: none;
      z-index: 9999;
      max-height: 200px;
      overflow-y: auto;
      width: 100%;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    .autocomplete-suggestion {
      padding: 10px 15px;
      cursor: pointer;
      color: #e5f3ee;
      font-size: 13px;
      transition: background 0.2s;
    }
    .autocomplete-suggestion:hover {
      background: rgba(31,163,122,0.2);
      color: #7cf0c2;
    }
    .form-group { position: relative; }
    /* ----------------------------------- */

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.ativo {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(180deg, rgba(15,42,34,.95), rgba(5,11,9,.95));
      border: 1px solid rgba(31,163,122,.25);
      border-radius: 20px;
      padding: 30px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 60px rgba(0,0,0,.6);
    }

    .modal-header {
      color: #1fa37a;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(31,163,122,.2);
      padding-bottom: 15px;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(255,107,107,.2);
      border: 1px solid rgba(255,107,107,.3);
      color: #ff6b6b;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.3s;
    }

    .modal-close:hover {
      background: rgba(255,107,107,.3);
      box-shadow: 0 6px 12px rgba(255,107,107,.2);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 15px;
    }

    .form-group label {
      color: #8fb9ac;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      background: rgba(15,42,34,.5);
      border: 1px solid rgba(31,163,122,.2);
      color: #e5f3ee;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: rgba(31,163,122,.4);
      background: rgba(15,42,34,.7);
      box-shadow: 0 0 12px rgba(31,163,122,.2);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid rgba(31,163,122,.2);
    }

    .modal-buttons button {
      flex: 1;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
    }

    .btn-salvar {
      background: linear-gradient(145deg, rgba(31,163,122,.4), rgba(31,163,122,.2));
      color: #7cf0c2;
    }

    .btn-salvar:hover {
      background: linear-gradient(145deg, rgba(31,163,122,.5), rgba(31,163,122,.3));
      box-shadow: 0 10px 20px rgba(31,163,122,.2);
    }

    .btn-cancelar {
      background: linear-gradient(145deg, rgba(255,107,107,.25), rgba(255,107,107,.1));
      color: #ff6b6b;
    }

    .btn-cancelar:hover {
      background: linear-gradient(145deg, rgba(255,107,107,.35), rgba(255,107,107,.2));
    }

    /* ============ STATS ============ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: linear-gradient(145deg, rgba(31,163,122,.15), rgba(31,163,122,.08));
      border: 1px solid rgba(31,163,122,.2);
      border-radius: 16px;
      padding: 15px;
      text-align: center;
    }

    .stat-label {
      color: #8fb9ac;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-value {
      color: #1fa37a;
      font-size: 24px;
      font-weight: 700;
    }

    /* ============ RESPONSIVO ============ */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 15px;
        padding: 15px;
      }

      .header h1 {
        font-size: 22px;
      }

      .filtros-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 10px;
      }

      .modal-content {
        width: 95%;
        padding: 20px;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* ============ LOADER ============ */
    .loader-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }

    .loader-container.hidden {
      display: none;
    }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(31, 163, 122, 0.2);
      border-top: 4px solid #1fa37a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      color: #7cf0c2;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
    }

    .loader-subtext {
      color: #5fa39c;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
  <script src="modais-globais.js"></script>
</head>
<body>

<!-- LOADING OVERLAY PARA OPERAÇÕES -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
</div>

<!-- LOADER DE CARREGAMENTO -->
<div id="loaderContainer" class="loader-container">
  <div class="loader">
    <div class="spinner"></div>
    <div class="loader-text">⏳ Carregando Transportes...</div>
    <div class="loader-subtext">Buscando dados do Drive</div>
  </div>
</div>

<div class="container">
  <!-- ============ HEADER ============ -->
  <div class="header">
    <h1>🚚 Transporte & Rastreamento</h1>
    <div class="header-actions">
      <button class="btn btn-adicionar" onclick="abrirModalAdicionar()">+ Adicionar Transporte</button>
      <button class="btn" onclick="voltarDashboard()">← Voltar</button>
    </div>
  </div>

  <!-- ============ ESTATÍSTICAS ============ -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total de Transportes</div>
      <div class="stat-value" id="totalTransportes">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Entregues</div>
      <div class="stat-value" id="totalEntregues" style="color: #32c832;">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pendentes</div>
      <div class="stat-value" id="totalPendentes" style="color: #ffc107;">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Valor Total Frete</div>
      <div class="stat-value" id="totalValor" style="color: #d4af37;">R$ 0</div>
    </div>
  </div>

  <!-- ============ FILTROS ============ -->
  <div class="filtros-section">
    <h3>🔍 Filtros de Busca</h3>
    <div class="filtros-grid">
      <div class="input-group">
        <label>Nome do Cliente</label>
        <input type="text" id="filtroCliente" placeholder="Digite o nome..." onkeyup="filtrarTransportes()" onkeypress="if(event.key==='Enter') scrollParaPrimeiroTransporte()">
      </div>
      <div class="input-group">
        <label>Status</label>
        <select id="filtroStatus" onchange="filtrarTransportes()">
          <option value="">Todos</option>
          <option value="0">Não Entregue</option>
          <option value="1">Entregue</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ============ TABELA ============ -->
  <div id="tabelaContainer"></div>
</div>

<!-- ============ MODAL ADICIONAR/EDITAR ============ -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="fecharModal()">✕</span>
    <div class="modal-header" id="modalTitulo">➕ Adicionar Transporte</div>
    
    <form id="formTransporte">
      <div class="form-group">
        <label>Cliente *</label>
        <input type="text" id="nomeCliente" required>
      </div>

      <div class="form-group">
        <label>Cidade *</label>
        <input type="text" id="cidade" required>
      </div>

      <div class="form-group">
        <label>Estado (UF) *</label>
        <input type="text" id="estado" maxlength="2" required>
      </div>

      <div class="form-group">
        <label>Transportadora *</label>
        <input type="text" id="transportadora" required>
      </div>

      <div class="form-group">
        <label>Código de Rastreio *</label>
        <input type="text" id="codigoRastreio" required>
      </div>

      <div class="form-group">
        <label>Número da NF *</label>
        <input type="text" id="numeroNF" required>
      </div>

      <div class="form-group">
        <label>Valor do Frete (R$) *</label>
        <input type="number" id="valorFrete" step="0.01" required>
      </div>

      <div class="form-group">
        <label>Data de Pagamento do Frete</label>
        <select id="dataPagamentoFrete">
          <option value="">Sem data específica</option>
          <option value="1">Pagar 1 dia após entrega</option>
          <option value="15">Pagar 15 dias após entrega</option>
          <option value="30">Pagar 30 dias após entrega</option>
        </select>
      </div>

      <div class="form-group">
        <label>Quantidade de Animais *</label>
        <input type="number" id="quantidadeAnimais" min="1" required>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select id="status">
          <option value="0">Não Entregue</option>
          <option value="1">Entregue</option>
        </select>
      </div>

      <div class="form-group">
        <label>Data de Entrega</label>
        <input type="datetime-local" id="dataEntrega">
      </div>

      <div class="form-group">
        <label>Observações</label>
        <textarea id="observacao" placeholder="Adicione notas sobre o transporte..."></textarea>
      </div>

      <div class="modal-buttons">
        <button type="submit" class="btn-salvar">💾 Salvar</button>
        <button type="button" class="btn-cancelar" onclick="fecharModal()">✕ Cancelar</button>
      </div>
    </form>
  </div>
</div>

  <script src="config.js"></script>
<script src="auth-utils.js"></script>
  <script src="auth.js"></script>
  <script src="auditoria.js"></script>
  <script>
    let transportes = [];
    let transportesExibindo = [];
    let editandoId = null;
    let clientesMap = {};
    let listaClientesGlobal = []; // Nova variável

    function configurarAutocompleteCliente() {
      const input = document.getElementById('nomeCliente');
      // Remove container antigo se existir para não duplicar
      const antigo = input.parentNode.querySelector('.autocomplete-suggestions');
      if (antigo) antigo.remove();

      const sugestoesContainer = document.createElement('div');
      sugestoesContainer.className = 'autocomplete-suggestions';
      input.parentNode.appendChild(sugestoesContainer);

      input.addEventListener('input', function() {
        const valor = this.value.toLowerCase();
        sugestoesContainer.innerHTML = '';
        if (!valor) return;

        const filtrados = listaClientesGlobal.filter(c => 
          c.Nome.toLowerCase().includes(valor)
        ).slice(0, 5);

        filtrados.forEach(cliente => {
          const div = document.createElement('div');
          div.className = 'autocomplete-suggestion';
          div.innerHTML = `<strong>${cliente.Nome}</strong>  
<small>${cliente.Cidade} - ${cliente.Estado}</small>`;
          div.onclick = function() {
            input.value = cliente.Nome;
            document.getElementById('cidade').value = cliente.Cidade || '';
            document.getElementById('estado').value = cliente.Estado || '';
            sugestoesContainer.innerHTML = '';
          };
          sugestoesContainer.appendChild(div);
        });
      });

      document.addEventListener('click', (e) => {
        if (e.target !== input) sugestoesContainer.innerHTML = '';
      });
    }

    // ============ CARREGAR DADOS DO BACKEND ============
    async function carregarTransportes() {
      try {
        // Mostrar loader
        const loaderContainer = document.getElementById('loaderContainer');
        if (loaderContainer) {
          loaderContainer.classList.remove('hidden');
        }

        console.log('🔄 Iniciando carregamento de transportes...');
        
        // Carregar transporte.json usando buscarArquivo (vem do auth.js)
        console.log('📥 Buscando transporte.json...');
        transportes = await buscarArquivo("transporte.json");
        
        
        // Garantir que é um array
        if (!Array.isArray(transportes)) {
          transportes = [];
        }
        
        console.log('✅ Transportes carregados:', transportes.length, 'registros');
        
        // Carregar clientes.json para referência
        console.log('📥 Buscando clientes.json...');
        let clientes = await buscarArquivo("clientes.json");
        
        console.log('📊 Clientes retornados:', clientes);
        console.log('📊 É array?', Array.isArray(clientes));
        
        // Garantir que é array
        if (!Array.isArray(clientes)) {
          clientes = clientes.dados || clientes[0] || [];
        }

    const cliente = document.getElementById('filtroCliente').value.toLowerCase();

    transportesExibindo = transportes.filter(t => {
      const matchCliente = !cliente || t.NomeCliente.toLowerCase().includes(cliente);

  // ============ ALTERNAR STATUS E SALVAR ============
  async function alternarStatus(event, id) {
    event.stopPropagation();
    
    const transporte = transportes.find(t => t.Id === id);
    if (!transporte) return;

    // Perguntar qual status deseja
    const input = await modalEscolherOpcao('Status do transporte', 'Escolha o novo status:', [{ value: '1', label: '1 = Entregue ✓' }, { value: '0', label: '0 = Pendente ⏳' }]);
    
    if (input === null) return; // Cancelou
    
    const novoStatus = parseInt(input);
    if (novoStatus !== 0 && novoStatus !== 1) {
      alert('❌ Digite apenas 0 (Pendente) ou 1 (Entregue)');
      return;
    }

    const statusAnterior = transporte.Status;
    
    // Se é o mesmo status, não faz nada
    if (novoStatus === transporte.Status) {
      alert('ℹ️ Status já é ' + (novoStatus === 1 ? 'Entregue' : 'Pendente'));
      return;
    }

    // Mostrar loading
    mostrarLoading();

    try {
      // Guardar estado anterior para auditoria
      const dataEntregaAntiga = transporte.DataEntrega;

      // ✅ BUSCAR DO DRIVE O ARRAY COMPLETO
      const transportesDoServidor = await buscarArquivo('transporte.json');
      if (!Array.isArray(transportesDoServidor)) {
        ocultarLoading();
        alert('❌ Erro: dados do servidor inválidos');
        return;
      }

      console.log('📥 Array do servidor carregado, total:', transportesDoServidor.length);

      // ✅ ENCONTRAR E ATUALIZAR NO ARRAY DO SERVIDOR
      const idxNoServidor = transportesDoServidor.findIndex(t => t.Id === id);
      if (idxNoServidor < 0) {
        ocultarLoading();
        alert('❌ Transporte não encontrado no servidor');
        return;
      }

      const transporteNoServidor = transportesDoServidor[idxNoServidor];
      
      // Alterar status no objeto do servidor
      transporteNoServidor.Status = novoStatus;
      
      // Se mudou para entregue, registrar data
      if (transporteNoServidor.Status === 1) {
        transporteNoServidor.DataEntrega = new Date().toISOString();
      } else {
        transporteNoServidor.DataEntrega = null;
      }

      console.log('📝 Status alterado no servidor:', statusAnterior === 1 ? 'Entregue → Pendente' : 'Pendente → Entregue');

      // ✅ SALVAR O ARRAY ATUALIZADO NO GOOGLE DRIVE
      const resultado = await salvarTransportesNoGoogleDrive(transportesDoServidor);
      if (!resultado) {
        ocultarLoading();
        alert('❌ Erro ao salvar no Drive');
        return;
      }

      console.log('✅ Transporte salvo no Drive');

      // ✅ RECARREGAR DO DRIVE IMEDIATAMENTE
      const recarregouOK = await recarregarTransportesDoServidor();
      if (!recarregouOK) {
        ocultarLoading();
        alert('⚠️ Salvo no Drive mas erro ao recarregar dados');
        return;
      }
      
      // ✅ ATUALIZAR UI COM DADOS FRESCOS DO DRIVE
      console.log('🔄 Atualizando UI...');
      renderizarTabela();
      atualizarEstatisticas();
      
      // ✅ REGISTRAR AUDITORIA (sem esperar, mas com pequeno delay)
      setTimeout(() => {
        const statusTexto = novoStatus === 1 ? 'Entregue' : 'Pendente';
        registrarAuditoria(
          'Atualizar Status',
          'Transporte',
          id.toString(),
          `${transporteNoServidor.NomeCliente} - NF ${transporteNoServidor.NumeroNF}`,
          `Status alterado para ${statusTexto}`,
          JSON.stringify({ Status: statusAnterior, DataEntrega: dataEntregaAntiga }),
          JSON.stringify({ Status: transporteNoServidor.Status, DataEntrega: transporteNoServidor.DataEntrega })
        );
      }, 100);

      ocultarLoading();
      alert(`✅ Status alterado para ${transporteNoServidor.Status === 1 ? '✓ Entregue' : '⏳ Pendente'}`);
    } catch (erro) {
      console.error('❌ Erro ao salvar:', erro);
      ocultarLoading();
      alert('❌ Erro: ' + erro.message);
    }
  }

  // ============ SALVAR TRANSPORTES NO GOOGLE DRIVE ============
  async function salvarTransportesNoGoogleDrive(transportes) {
    try {
      const dadosJson = JSON.stringify(transportes);
      const deviceId = localStorage.getItem('deviceId') || 'device-' + Date.now();

      console.log('📤 Enviando transportes para Google Drive:', {
        acao: 'salvar',
        arquivo: 'transporte.json',
        deviceId: deviceId,
        tamanho: dadosJson.length
      });

      const response = await fetch(CONFIG.API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams({
          'acao': 'salvar',
          'arquivo': 'transporte.json',
          'dados': dadosJson,
          'deviceId': deviceId
        })
      });

      console.log('📡 Status da resposta:', response.status, response.ok);

      if (!response.ok) {
        console.error('❌ Resposta HTTP não OK:', response.status);
        return false;
      }

      let resultado;
      try {
        const textoResposta = await response.text();
        console.log('📨 Resposta COMPLETA do servidor (', textoResposta.length, 'chars):', textoResposta);
        
        if (textoResposta && textoResposta.trim()) {
          try {
            resultado = JSON.parse(textoResposta);
            console.log('✅ Parse JSON bem-sucedido');
          } catch (parseError) {
            console.log('⚠️ Resposta não é JSON, mas vou aceitar como sucesso');
            resultado = { success: true };
          }
        } else {
          resultado = { success: true };
        }
      } catch (e) {
        console.log('⚠️ Erro ao ler resposta:', e.message);
        resultado = { success: true };
      }

      console.log('🔍 Objeto resultado:', resultado);
      const sucesso = resultado && (resultado.success === true || resultado.sucesso === true);
      console.log('🔍 Validação sucesso:', sucesso);
      
      if (!sucesso) {
        console.error('❌ Servidor retornou erro:', resultado);
        return false;
      }

      console.log('✅✅✅ Arquivo DEFINITIVAMENTE salvo no Google Drive');
      return true;

    } catch (erro) {
      console.error('❌ Erro ao salvar:', erro);
      return false;
    }
  }

      if (!Array.isArray(transportesDoServidor)) {

        alert('❌ Erro: dados do servidor inválidos');

            ${transporte.DataEntrega && transporte.Status === 1 
              ? `<div style="margin-bottom: 15px;">
                  <div style="position: absolute; left: -8px; top: 60px; width: 14px; height: 14px; background: #00ff00; border-radius: 50%; border: 2px solid #0a0f0d;"></div>
                  <p style="color: #8fb9ac; font-size: 11px; text-transform: uppercase; margin-bottom: 2px;">Entregue</p>
                  <p style="color: #00ff00; font-weight: 700;">${new Date(transporte.DataEntrega).toLocaleDateString('pt-BR')} às ${new Date(transporte.DataEntrega).toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'})}</p>
                </div>`
              : `<div style="margin-bottom: 15px;">
                  <div style="position: absolute; left: -8px; top: 60px; width: 14px; height: 14px; background: rgba(255,170,0,.5); border-radius: 50%; border: 2px solid #0a0f0d;"></div>
                  <p style="color: #8fb9ac; font-size: 11px; text-transform: uppercase; margin-bottom: 2px;">Em Trânsito</p>
                  <p style="color: #ffaa00; font-weight: 700;">Previsão: em breve</p>
                </div>`
            }
          </div>
        </div>

        <div style="background: rgba(255,255,255,.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(31,163,122,.15);">
          <h4 style="color: #7cf0c2; margin-bottom: 10px; font-size: 13px; font-weight: 600;">📋 Detalhes</h4>
          <table style="width: 100%; font-size: 13px;">
            <tr>
              <td style="color: #8fb9ac; padding: 8px 0;">Quantidade de Animais:</td>
              <td style="color: #7cf0c2; font-weight: 700; text-align: right;">${transporte.QuantidadeAnimais}</td>
            </tr>
            <tr>
              <td style="color: #8fb9ac; padding: 8px 0;">Valor do Frete:</td>
              <td style="color: #7cf0c2; font-weight: 700; text-align: right;">R$ ${parseFloat(transporte.ValorFrete).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
            </tr>
            ${transporte.Observacao 
              ? `<tr>
                  <td style="color: #8fb9ac; padding: 8px 0;">Observação:</td>
                  <td style="color: #7cf0c2; font-weight: 700; text-align: right;">${transporte.Observacao}</td>
                </tr>`
              : ''}
          </table>
        </div>

        <!-- Botões de Ação -->
        <div style="display: grid; grid-template-columns: ${podeRastrarAutomatico ? '1fr 1fr 1fr' : '1fr 1fr'}; gap: 10px;">
          ${podeRastrarAutomatico 
            ? `<button onclick="rastrearAutomaticoTNT('${transporte.NumeroNF}')" style="padding: 12px; background: linear-gradient(145deg, rgba(31,163,122,.3), rgba(31,163,122,.15)); color: #7cf0c2; border: 1px solid rgba(31,163,122,.3); border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: 12px;">
              🔄 Rastrear TNT
            </button>`
            : `<button disabled style="padding: 12px; background: rgba(100,100,100,.2); color: #666; border: 1px solid rgba(100,100,100,.2); border-radius: 8px; cursor: not-allowed; font-weight: 600; font-size: 12px;">
              🔄 Apenas TNT
            </button>`
          }
          <button onclick="notificarWhatsApp(${id})" style="padding: 12px; background: linear-gradient(145deg, rgba(52,168,83,.3), rgba(52,168,83,.15)); color: #35a853; border: 1px solid rgba(52,168,83,.3); border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: 12px;">
            � WhatsApp
          </button>
          <button onclick="fecharModalRastreamento()" style="padding: 12px; background: linear-gradient(145deg, rgba(212,175,55,.3), rgba(212,175,55,.15)); color: #d4af37; border: 1px solid rgba(212,175,55,.3); border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: 12px;">
            ✕ Fechar
          </button>
        </div>
      </div>
    `;

    const container = document.getElementById('rastreamentoContainer');
    if (!container) {
      const div = document.createElement('div');
      div.id = 'rastreamentoContainer';
      div.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; z-index: 1000; background: #0a0f0d; border: 1px solid rgba(31,163,122,.3); border-radius: 16px; padding: 25px; backdrop-filter: blur(14px);';
      document.body.appendChild(div);
    }
    
    container.style.display = 'block';
    container.innerHTML = html;

    // Overlay
    let overlay = document.getElementById('rastreamentoOverlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'rastreamentoOverlay';
      overlay.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 999;';
      overlay.onclick = fecharModalRastreamento;
      document.body.appendChild(overlay);
    }
    overlay.style.display = 'block';
  }

  function fecharModalRastreamento() {
    const container = document.getElementById('rastreamentoContainer');
    const overlay = document.getElementById('rastreamentoOverlay');
    if (container) container.style.display = 'none';
    if (overlay) overlay.style.display = 'none';
  }

  // ============ RASTREAMENTO AUTOMÁTICO TNT ============
  function rastrearAutomaticoTNT(numeroNF) {
    // Abre site da TNT e preenche automaticamente via JavaScript
    
    const cnpjFixo = "55951841000176";
    const urlTNT = `https://radar.tntbrasil.com.br/radar/public/localizacaoSimplificada.do`;
    
    console.log('� Rastreando NF:', numeroNF);
    
    // Abrir em nova aba
    const janela = window.open(urlTNT, '_blank');
    
    // Tentar preencher automaticamente após carregamento
    if (janela) {
      // Esperar página carregar
      janela.onload = () => {
        try {
          // Tentar acessar elementos da página (pode falhar por CORS)
          const campoCnpj = janela.document.getElementById('nrIdentificacao');
          const campoNF = janela.document.getElementById('nrDocumentoDigito');
          
          if (campoCnpj) {
            campoCnpj.value = cnpjFixo;
            campoCnpj.dispatchEvent(new Event('change', { bubbles: true }));
          }
          
          if (campoNF) {
            campoNF.value = numeroNF;
            campoNF.dispatchEvent(new Event('change', { bubbles: true }));
          }
          
          console.log('✅ Campos preenchidos automaticamente na TNT');
        } catch (erro) {
          console.log('⚠️ Não foi possível preencher automaticamente (CORS). Página aberta manualmente.');
          console.log('Por favor, preencha: CNPJ=' + cnpjFixo + ', NF=' + numeroNF);
        }
      };
      
      // Mensagem ao usuário
      alert(`
� RASTREAMENTO TNT

✅ Página de rastreamento aberta
📌 Dados a preencher:
   • CNPJ: ${cnpjFixo}
   • NF (Nota Fiscal): ${numeroNF}

Se os campos não foram preenchidos automaticamente:
1. Copie e cole o CNPJ
2. Copie e cole o número da NF
3. Selecione tipo: "Nota Fiscal"
4. Clique em "Buscar"
      `);
    } else {
      alert('❌ Erro: Abrir pop-up foi bloqueado. Desabilite o bloqueador de pop-ups.');
    }
  }

  // ============ NOTIFICAÇÃO WHATSAPP ============
  async function notificarWhatsApp(id) {
    const transporte = transportes.find(t => t.Id === id);
    if (!transporte) return;

    // Simular busca de telefone do cliente (em produção viria do banco)
    const telefone = '5511999999999'; // Placeholder - seria do cliente.Telefone1
    
    const mensagem = `🚚 *Rastreamento de Entrega*\n\n` +
      `Cliente: ${transporte.NomeCliente}\n` +
      `Transportadora: ${transporte.Transportadora}\n` +
      `Código: ${transporte.CodigoRastreio}\n` +
      `NF: ${transporte.NumeroNF}\n` +
      `Status: ${transporte.Status === 1 ? '✅ ENTREGUE' : '⏳ EM TRÂNSITO'}\n` +
      `Animais: ${transporte.QuantidadeAnimais}\n` +
      `Valor: R$ ${parseFloat(transporte.ValorFrete).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

    // URL com mensagem codificada
    const urlWhatsApp = `https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`;
    
    const confirmacao = `
📱 NOTIFICAÇÃO WHATSAPP

Mensagem a enviar:
${mensagem}

Deseja abrir o WhatsApp agora?`;

    if (await modalConfirm(confirmacao, { title: 'Notificação de rastreamento', okText: 'Abrir WhatsApp', cancelText: 'Cancelar' })) {
      window.open(urlWhatsApp, '_blank');
      console.log('📱 Abrindo WhatsApp para:', telefone);
      alert('✅ Notificação de rastreamento enviada ao cliente via WhatsApp!');
    }
  }

  // ============ VOLTAR ============
  function voltarDashboard() {
    window.location.href = 'index.html';
  }

  // ============ INICIALIZAR ============
  window.addEventListener('load', carregarTransportes);
  
  // Fechar modal ao clicar fora
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) {
      fecharModal();
    }
  });

  // Traduzir erro de rede
  function traduzirErro(erro) {
    if (!erro.message) return 'Erro desconhecido';
    const msg = erro.message.toLowerCase();
    if (msg.includes('failed to fetch') || msg.includes('network') || msg.includes('timeout')) {
      return 'Falta de conexão com a internet. Verifique sua conexão.';
    }
    return `Erro ao carregar transportes: ${erro.message}`;
  }
</script>
