<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Acesso Seguro - Bovi Premium</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #0e1f1a 0%, #050b09 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5f3ee;
    }

    .keygate {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      backdrop-filter: blur(20px);
      border: 1px solid rgba(31,163,122,.3);
      border-radius: 24px;
      padding: 60px 50px;
      max-width: 480px;
      width: 100%;
      margin: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.1);
      animation: slideIn 0.6s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .keygate-header {
      text-align: center;
      margin-bottom: 45px;
    }

    .keygate-icon {
      font-size: 48px;
      margin-bottom: 20px;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .keygate-header h1 {
      font-size: 32px;
      color: #1fa37a;
      margin-bottom: 10px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .keygate-header p {
      color: #8fb9ac;
      font-size: 15px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 28px;
    }

    .form-group label {
      display: block;
      color: #1fa37a;
      font-weight: 600;
      margin-bottom: 12px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 16px 18px;
      border: 1.5px solid rgba(31,163,122,.3);
      border-radius: 12px;
      background: rgba(31,163,122,.05);
      color: #e5f3ee;
      font-size: 16px;
      backdrop-filter: blur(14px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .form-group input::placeholder {
      color: #5d8b80;
    }

    .form-group input:focus {
      outline: none;
      border-color: #1fa37a;
      background: rgba(31,163,122,.1);
      box-shadow: 0 0 0 4px rgba(31,163,122,.15);
    }

    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #1fa37a;
      cursor: pointer;
      font-size: 18px;
      padding: 8px;
      transition: all 0.2s;
    }

    .toggle-password:hover {
      color: #0f6b52;
    }

    .btn-acessar {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1fa37a 0%, #0f6b52 100%);
      color: #fff;
      border: none;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 30px rgba(31,163,122,.35);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 50px;
    }

    .btn-acessar:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(31,163,122,.5);
    }

    .btn-acessar:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 5px 20px rgba(31,163,122,.3);
    }

    .btn-acessar:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .mensagem {
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
      border-left: 4px solid;
      animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .mensagem.erro {
      background: rgba(217,83,79,.15);
      color: #ff9999;
      border-left-color: #d9534f;
      display: block;
    }

    .mensagem.sucesso {
      background: rgba(92,184,92,.15);
      color: #90ee90;
      border-left-color: #5cb85c;
      display: block;
    }

    .info-footer {
      text-align: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,.1);
      font-size: 12px;
      color: #5d8b80;
    }

    @media (max-width: 480px) {
      .keygate {
        padding: 40px 25px;
        border-radius: 20px;
      }

      .keygate-header h1 {
        font-size: 28px;
      }

      .keygate-icon {
        font-size: 40px;
      }

      .form-group input {
        padding: 14px 16px;
        font-size: 14px;
      }

      .btn-acessar {
        padding: 14px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

<div class="keygate">
  <div class="keygate-header">
    <div class="keygate-icon">🔐</div>
    <h1>Acesso Seguro</h1>
    <p>Este repositório requer autenticação. Digite a palavra-chave para continuar.</p>
  </div>

  <div class="mensagem" id="mensagem"></div>

  <form id="formChave" onsubmit="validarChave(event)">
    <div class="form-group">
      <label for="chaveAcesso">Palavra-Chave</label>
      <div class="input-wrapper">
        <input 
          type="password" 
          id="chaveAcesso" 
          placeholder="Digite a palavra-chave..."
          required
          autocomplete="off"
          spellcheck="false"
        >
        <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
      </div>
    </div>

    <button type="submit" class="btn-acessar" id="btnAcessar">
      <span id="btnTexto">Validar Acesso</span>
      <span class="spinner" id="spinner" style="display: none;"></span>
    </button>
  </form>

  <div class="info-footer">
    <strong>🛡️ Sistema Seguro</strong><br>
    Todos os acessos são monitorados e validados no servidor.
  </div>
</div>

<script src="config.js"></script>
<script>
// 🔐 VALIDAR CHAVE DE ACESSO
async function validarChave(event) {
  event.preventDefault();

  const chave = document.getElementById('chaveAcesso').value.trim();
  const mensagem = document.getElementById('mensagem');
  const btnAcessar = document.getElementById('btnAcessar');
  const btnTexto = document.getElementById('btnTexto');
  const spinner = document.getElementById('spinner');
  const formChave = document.getElementById('formChave');

  // Limpar mensagens
  mensagem.className = 'mensagem';
  mensagem.textContent = '';

  if (!chave) {
    exibirErro(mensagem, 'Digite a palavra-chave');
    return;
  }

  // Desabilitar botão
  btnAcessar.disabled = true;
  btnTexto.style.display = 'none';
  spinner.style.display = 'block';

  try {
    // Gerar device ID único
    const deviceId = gerarDeviceId();
    console.log('📱 Device ID:', deviceId);

    // Enviar para Google Apps Script
    const url = new URL(CONFIG.API_URL);
    url.searchParams.append('acao', 'validarChave');
    url.searchParams.append('chave', chave);
    url.searchParams.append('deviceId', deviceId);

    console.log('📤 Enviando requisição...', url.toString().substring(0, 100) + '...');

    const response = await fetch(url.toString(), {
      method: 'GET',
      cache: 'no-store'
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const resultado = await response.json();
    console.log('📥 Resposta do servidor:', resultado);

    if (resultado.sucesso) {
      // ✅ CHAVE CORRETA - SALVAR APENAS DEVICE ID
      // Google Apps Script vai identificar pelo cache
      localStorage.setItem('deviceId', deviceId);
      localStorage.setItem('autenticado', 'true');

      console.log('✅ PC autenticado e salvo:', deviceId);

      exibirSucesso(mensagem, '✅ ' + resultado.mensagem);

      // Redirecionar após 1.5s
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);

    } else {
      exibirErro(mensagem, '❌ ' + (resultado.mensagem || 'Palavra-chave inválida'));
    }

  } catch (erro) {
    console.error('❌ Erro na requisição:', erro);
    exibirErro(mensagem, '❌ Erro ao validar. Tente novamente.');
  } finally {
    btnAcessar.disabled = false;
    btnTexto.style.display = 'block';
    spinner.style.display = 'none';
  }
}

// ⬆️ Mostrar/Ocultar senha
function togglePassword() {
  const input = document.getElementById('chaveAcesso');
  input.type = input.type === 'password' ? 'text' : 'password';
}

// 🎲 Gerar Device ID único
function gerarDeviceId() {
  const nav = navigator;
  const screen_info = screen.width + 'x' + screen.height;
  const timezone = new Date().getTimezoneOffset();
  const language = nav.language || 'unknown';
  const userAgent = nav.userAgent;

  const combinado = `${userAgent}|${language}|${timezone}|${screen_info}`;

  let hash = 0;
  for (let i = 0; i < combinado.length; i++) {
    const char = combinado.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash; // Convert to 32bit integer
  }

  return Math.abs(hash).toString(36).substring(0, 20);
}

//  Exibir erro
function exibirErro(elemento, texto) {
  elemento.className = 'mensagem erro';
  elemento.textContent = texto;
}

// ✅ Exibir sucesso
function exibirSucesso(elemento, texto) {
  elemento.className = 'mensagem sucesso';
  elemento.textContent = texto;
}

// 🚀 Verificar se já está autenticado
window.addEventListener('load', () => {
  const deviceId = localStorage.getItem('deviceId');
  const autenticado = localStorage.getItem('autenticado');
  
  if (deviceId && autenticado === 'true') {
    console.log('✅ Usuário já autenticado, redirecionando...');
    window.location.href = 'index.html';
  }
});
</script>
</body>
</html>
