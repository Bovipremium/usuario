<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Empresarial - Dashboard</title>
  
  <!-- 🔐 PROTEÇÃO DE ACESSO - VALIDAR AUTENTICAÇÃO ANTES DE TUDO -->
  <script>
    // ⚠️ BLOQUEAR ACESSO SE NÃO TIVER AUTENTICAÇÃO
    const deviceId = localStorage.getItem('deviceId');
    const autenticado = localStorage.getItem('autenticado');
    
    if (!deviceId || autenticado !== 'true') {
      console.warn('🔐 ACESSO BLOQUEADO - Redirecionando para autenticação...');
      window.location.replace('keygate.html');
    }
  </script>
   <link rel="icon" type="image/png" href="assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidebar-dock.css">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0e1f1a, #050b09 70%);
      color: #e5f3ee;
      min-height: 100vh;
    }

    /* ===============================
       HEADER PREMIUM COM LOGO
    ================================ */

    .header {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 6%;
      border-bottom: 1px solid rgba(255,255,255,.08);
      z-index: 2;
    }

    .header::after {
      content: "";
      position: absolute;
      right: -150px;
      top: -150px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(31,163,122,0.35), transparent 70%);
      filter: blur(80px);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 22px;
      font-weight: 600;
      z-index: 1;
      color: #e5f3ee;
    }

    .logo-area img {
      height: 48px;
      max-width: 160px;
      object-fit: contain;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 1;
    }

    .user-photo {
      width: 50px;
      height: 65px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid rgba(31,163,122,.4);
      cursor: pointer;
      transition: all 0.3s;
      flex-shrink: 0;
      background: rgba(31,163,122,.1);
      display: block;
      image-rendering: crisp-edges;
    }

    .user-photo:hover {
      border-color: rgba(31,163,122,.8);
      box-shadow: 0 4px 12px rgba(31,163,122,.3);
      transform: scale(1.05);
    }

    .user-name {
      font-size: 14px;
      color: #b9d8ce;
      font-weight: 600;
    }

    .btn-logout {
      padding: 12px 26px;
      border-radius: 999px;
      background: linear-gradient(135deg, #1fa37a, #0f6b52);
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(31,163,122,.35);
      transition: all 0.3s;
    }

    .btn-logout:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(31,163,122,.5);
    }

    /* ===============================
       FUNDO INSTITUCIONAL COM LOGO GIGANTE
    ================================ */

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("assets/img/logo-bovi-premium.png") center no-repeat;
      background-size: 520px;
      opacity: 0.05;
      z-index: -1;
      pointer-events: none;
    }

    /* ===============================
       CONTAINER E MENU
    ================================ */

    .container {
      position: relative;
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 6% 40px;
      z-index: 1;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 32px;
      margin-bottom: 60px;
    }

    /* ===============================
       MENU MAIS MODERNO
    ================================ */

    .menu-item {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px;
      padding: 36px 30px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }

    .menu-item:hover {
      transform: translateY(-8px);
      border-color: #1fa37a;
      background: linear-gradient(180deg, rgba(31,163,122,.15), rgba(31,163,122,.05));
      box-shadow: 0 8px 24px rgba(31,163,122,.18);
    }

    .menu-item h3 {
      color: #1fa37a;
      margin-bottom: 10px;
      font-size: 1.3rem;
    }

    .menu-item p {
      color: #cbe5dc;
      line-height: 1.6;
    }

    /* ===============================
       CONTEÚDO ELEVADO
    ================================ */

    .content {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px;
      padding: 40px;
    }

    .content h2 {
      color: #1fa37a;
      margin-bottom: 30px;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .search-box {
      margin-bottom: 30px;
      display: flex;
      gap: 12px;
    }

    .search-box input {
      flex: 1;
      max-width: 400px;
      padding: 14px 18px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 12px;
      font-size: 14px;
      background: rgba(255,255,255,.08);
      color: #e5f3ee;
      backdrop-filter: blur(14px);
      transition: all 0.3s;
    }

    .search-box input::placeholder {
      color: #8fb9ac;
    }

    .search-box input:focus {
      outline: none;
      border-color: #1fa37a;
      background: rgba(31,163,122,.1);
    }

    .search-box button {
      padding: 14px 28px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1fa37a, #0f6b52);
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 30px rgba(31,163,122,.35);
    }

    .search-box button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(31,163,122,.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table thead {
      background: rgba(31,163,122,.15);
      border-bottom: 2px solid rgba(31,163,122,.5);
    }

    table th,
    table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.1);
      color: #e5f3ee;
    }

    table th {
      color: #1fa37a;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    table tr:hover {
      background: rgba(31,163,122,.1);
    }

    table tr.click-pagamento {
      cursor: pointer;
    }

    table tr.click-pagamento:hover {
      background: rgba(31,163,122,.2);
      border-left: 4px solid #1fa37a;
    }

    .loading {
      text-align: center;
      color: #1fa37a;
      padding: 40px;
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(31,163,122,.3);
      border-top: 3px solid #1fa37a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .erro {
      background-color: rgba(217,83,79,.2);
      color: #ff8a8a;
      padding: 15px;
      border-radius: 5px;
      border-left: 4px solid #d9534f;
    }

    .hidden {
      display: none;
    }

    /* ============================================
       RESPONSIVO LOGO
    ================================ */

    @media (max-width: 768px) {
      .logo-area span {
        font-size: 18px;
      }

      .logo-area img {
        height: 40px;
      }

      body::before {
        background-size: 360px;
      }

      .header {
        padding: 15px 6%;
      }

      .container {
        padding: 40px 6% 20px;
      }

      .menu {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
        margin-bottom: 30px;
      }

      .menu-item {
        padding: 20px 15px;
      }

      .menu-item h3 {
        font-size: 1rem;
      }

      .menu-item p {
        font-size: 12px;
      }

      .content {
        padding: 20px;
      }

      .content h2 {
        font-size: 1.3rem;
        margin-bottom: 15px;
      }

      .search-box {
        flex-direction: column;
        margin-bottom: 15px;
      }

      .search-box input {
        max-width: 100%;
      }

      table {
        font-size: 12px;
      }

      table th,
      table td {
        padding: 10px;
      }
    }

    @media (max-width: 480px) {
      .header {
        flex-direction: column;
        gap: 15px;
        padding: 12px 6%;
      }

      .logo-area {
        width: 100%;
        justify-content: center;
      }

      .logo-area img {
        height: 36px;
      }

      .user-info {
        width: 100%;
        justify-content: space-between;
      }

      .user-name {
        font-size: 12px;
      }

      .btn-logout {
        padding: 8px 15px;
        font-size: 12px;
      }

      .container {
        padding: 30px 6% 10px;
      }

      .menu {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .content {
        padding: 15px;
      }

      .search-box input {
        padding: 12px;
        font-size: 14px;
      }

      table {
        font-size: 10px;
      }

      table th,
      table td {
        padding: 8px 6px;
      }
    }

    /* ===============================
       SIDEBAR COM MÓDULOS
    ================================ */

    .sidebar-item:hover {
      background: rgba(31,163,122,.3);
      border-color: #1fa37a;
      transform: scale(1.1);
    }

    .sidebar-item .tooltip {
      position: absolute;
      left: 75px;
      background: rgba(31,163,122,.95);
      color: #fff;
      padding: 8px 15px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1000;
      display: none;
    }

    .sidebar-item:hover .tooltip {
      opacity: 0;
    }

    .sidebar-divider {
      width: 30px;
      height: 1px;
      background: rgba(31,163,122,.3);
      margin: 8px 0;
    }

    .main-content {
      margin-left: 60px;
    }

    @media (max-width: 768px) {

      .sidebar-item .tooltip {
        display: none;
      }

      .sidebar-item.active .tooltip {
        display: none;
      }

      .main-content {
        margin-left: 50px;
      }
    }

    @media (max-width: 480px) {

      .sidebar-item.active .tooltip {
        display: none;
      }

      .main-content {
        margin-left: 45px;
      }
    }
  </style>
</head>
<body>

<!-- CONTEÚDO PRINCIPAL -->
<div class="main-content">

<!-- HEADER -->
<div class="header">
  <div class="logo-area">
    <img src="assets/img/logo-bovi-premium.png" alt="Bovi Premium">
    <span>Sistema Financeiro</span>
  </div>
  <div class="user-info">
    <div style="display: flex; align-items: center; gap: 16px; flex: 1;">
      <!-- FOTO E NOME -->
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <img id="fotoUsuario" class="user-photo" src="" alt="Foto do usuário" title="Clique para editar seu perfil" onclick="window.location.href='perfil-usuario.html'" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <span class="user-name" id="nomeUsuario" style="cursor: pointer; font-size: 13px; text-align: center;" onclick="window.location.href='perfil-usuario.html'" title="Clique para editar seu perfil">Carregando...</span>
      </div>
      
      <!-- CARD DE COMISSÃO -->
      <div id="usuarioComissao" style="display: none; background: linear-gradient(135deg, rgba(31,163,122,.1), rgba(255,193,7,.05)); padding: 12px 16px; border-radius: 6px; border: 1px solid rgba(31,163,122,.2); min-width: 200px;">
        <div style="font-size: 11px; color: #fff; margin-bottom: 6px; font-weight: 600;">💰 Seu Desempenho</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div>
            <p id="usuarioVendidoLabel" style="font-size: 10px; color: #fff; margin: 0 0 4px 0;">Vendido (Abril)</p>
            <p id="usuarioVendido" style="font-size: 14px; color: #1fa37a; font-weight: 700; margin: 0;">R$ 0,00</p>
          </div>
        <div>
            <p style="font-size: 10px; color: #fff; margin: 0 0 4px 0;">Comissão</p>
            <p id="usuarioComissaoValor" style="font-size: 14px; color: #ffc107; font-weight: 700; margin: 0;">R$ 0,00</p>
          </div>
        </div>
        <div style="margin-top: 10px; border-top: 1px solid rgba(31,163,122,.2); padding-top: 8px;">
          <p id="usuarioFaturamentoLabel" style="font-size: 10px; color: #fff; margin: 0 0 4px 0;">Vendido mês (Abril)</p>
          <p id="usuarioFaturamento" style="font-size: 13px; color: #a0e4cc; font-weight: 700; margin: 0;">R$ 0,00</p>
        </div>
      </div>
    </div>
    
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</div>

<!-- CONTAINER PRINCIPAL -->
<div class="container">
  <!-- MENU DE MÓDULOS -->
  <div class="menu" id="menu"></div>

  <!-- CONTEÚDO DINÂMICO -->
  <div class="content">
    <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 20px;">
      <h2 id="titulo">Dashboard</h2>
      <div id="botoesAcao"></div>
    </div>
    
    <div class="search-box hidden" id="searchBox">
      <input 
        type="text" 
        id="busca" 
        placeholder="🔍 Pesquisar dados..."
      >
    </div>

    <div id="conteudo"></div>
  </div>
</div>

</div><!-- FIM main-content -->

<script src="config.js"></script>
<script src="auth-utils.js"></script>
<script src="auth.js"></script>
<script src="auditoria.js"></script>
<script src="seguranca.js"></script>
<script src="alertas-ligacoes.js"></script>
<script src="alertas-global.js"></script>
<script src="app.js"></script>
<script src="sidebar-dock.js"></script>
</body>
</html>
