<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="icon" type="image/png" href="assets/img/logo.png">
  <link rel="stylesheet" href="sidebar-dock.css">
  <title>Detalhes de Despesas - Bovi Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at 20% 50%, #0e1f1a 0%, #050b09 100%);
      min-height: 100vh;
      color: #e5f3ee;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, rgba(31,163,122,.15), rgba(212,175,55,.08));
      border: 1px solid rgba(31,163,122,.25);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      backdrop-filter: blur(14px);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      color: #1fa37a;
      font-size: 28px;
      font-weight: 700;
    }

    .btn {
      background: linear-gradient(145deg, rgba(31,163,122,.3), rgba(31,163,122,.15));
      color: #7cf0c2;
      border: 1px solid rgba(31,163,122,.3);
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn:hover {
      background: linear-gradient(145deg, rgba(31,163,122,.4), rgba(31,163,122,.25));
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(31,163,122,.2);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(14px);
    }

    .card-label {
      color: #8fb9ac;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card-valor {
      color: #1fa37a;
      font-size: 28px;
      font-weight: 700;
    }

    .card-subtext {
      color: #5fa39c;
      font-size: 12px;
      margin-top: 8px;
    }

    .tabela-section {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(14px);
      overflow-x: auto;
      margin-bottom: 30px;
    }

    h2 {
      color: #1fa37a;
      font-size: 18px;
      margin-bottom: 20px;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      border-bottom: 2px solid rgba(31,163,122,.3);
    }

    th {
      color: #7cf0c2;
      padding: 15px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,.08);
      transition: all 0.3s;
    }

    tbody tr:hover {
      background: rgba(31,163,122,.1);
    }

    td {
      padding: 15px;
      color: #b9d8ce;
      font-size: 14px;
    }

    .data {
      color: #7cf0c2;
      font-weight: 600;
    }

    .descricao {
      color: #e5f3ee;
      font-weight: 500;
    }

    .valor {
      color: #d4af37;
      font-weight: 700;
      text-align: right;
    }

    .grafico-section {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(14px);
      margin-bottom: 30px;
    }

    .chart-container {
      position: relative;
      height: 300px;
      margin-bottom: 30px;
    }

    /* FILTRO POR CATEGORIA */
    .filtro-section {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(14px);
      margin-bottom: 30px;
    }

    .filtro-titulo {
      color: #1fa37a;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .filtro-dropdown {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-bottom: 20px;
    }

    .filtro-select {
      flex: 1;
      max-width: 400px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(31,163,122,.3);
      border-radius: 8px;
      color: #7cf0c2;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .filtro-select:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(31,163,122,.5);
    }

    .filtro-select:focus {
      outline: none;
      background: rgba(255,255,255,.1);
      border-color: #1fa37a;
      box-shadow: 0 0 15px rgba(31,163,122,.3);
    }

    .filtro-select option {
      background: #0e1f1a;
      color: #7cf0c2;
      padding: 10px;
    }

    .filtro-btn-reset {
      background: linear-gradient(145deg, rgba(244,67,54,.3), rgba(244,67,54,.15));
      color: #ef5350;
      border: 1px solid rgba(244,67,54,.3);
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .filtro-btn-reset:hover {
      background: linear-gradient(145deg, rgba(244,67,54,.5), rgba(244,67,54,.3));
      box-shadow: 0 0 15px rgba(244,67,54,.3);
    }

    .filtro-resumo {
      background: rgba(31,163,122,.15);
      border: 1px solid rgba(31,163,122,.2);
      border-radius: 8px;
      padding: 15px;
      color: #7cf0c2;
      font-size: 13px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #8fb9ac;
    }

    .chart-section-horizontal {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    @media (max-width: 1024px) {
      .chart-section-horizontal {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 20px;
      }

      .header h1 {
        font-size: 24px;
      }

      .cards {
        grid-template-columns: repeat(2, 1fr);
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 10px;
      }
    }
  </style>
</head>
</head>
<body>

<div class="container">
  <div class="header">
    <h1 id="headerTitle">📋 Detalhes de Despesas</h1>
    <button class="btn" onclick="window.location.href='despesas.html'">← Voltar</button>
  </div>

  <!-- FILTRO POR CATEGORIA E NOME - NO TOPO -->
  <div class="filtro-section">
    <div class="filtro-titulo">🏷️ Filtros</div>
    
    <div class="filtro-dropdown">
      <input type="text" id="filtroNome" placeholder="🔍 Filtrar por nome/descrição..." 
        oninput="filtrarPorNome(this.value); atualizarVisualizacao()"
        style="flex: 1; max-width: 400px; background: rgba(255,255,255,.05); border: 1px solid rgba(31,163,122,.3); border-radius: 8px; color: #7cf0c2; padding: 12px 16px; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;">
      
      <select id="filtroSelect" class="filtro-select" onchange="filtrarCategoria(this.value)">
        <option value="">✅ Todas as Categorias</option>
      </select>
      <button class="filtro-btn-reset" onclick="resetarFiltro()">🔄 Limpar Filtro</button>
    </div>
    <div class="filtro-resumo" id="filtroResumo">Selecione um filtro</div>
  </div>

  <!-- CARDS DE RESUMO -->
  <div class="cards">
    <div class="card">
      <div class="card-label">Total de Despesas</div>
      <div class="card-valor" id="totalDespesas">R$ 0,00</div>
      <div class="card-subtext" id="qtdDespesas">0 lançamentos</div>
    </div>
    <div class="card">
      <div class="card-label">Despesa Média</div>
      <div class="card-valor" id="mediaDespesas">R$ 0,00</div>
      <div class="card-subtext">por lançamento</div>
    </div>
    <div class="card">
      <div class="card-label">Maior Despesa</div>
      <div class="card-valor" id="maiorDespesa">R$ 0,00</div>
      <div class="card-subtext" id="maiorDesc">-</div>
    </div>
    <div class="card">
      <div class="card-label">Menor Despesa</div>
      <div class="card-valor" id="menorDespesa">R$ 0,00</div>
      <div class="card-subtext" id="menorDesc">-</div>
    </div>
  </div>

  <!-- GRÁFICOS -->
  <div class="chart-section-horizontal">
    <!-- Gráfico Diário -->
    <div class="grafico-section">
      <h2>📊 Evolução Diária</h2>
      <div class="chart-container">
        <canvas id="chartDiario"></canvas>
      </div>
    </div>

    <!-- Gráfico por Categoria -->
    <div class="grafico-section">
      <h2>📈 Despesas por Categoria</h2>
      <div class="chart-container">
        <canvas id="chartCategoria"></canvas>
      </div>
    </div>
  </div>

  <!-- TABELA DETALHADA -->
  <div class="tabela-section">
    <h2>📝 Todas as Despesas do Período</h2>
    <table>
      <thead>
        <tr>
          <th style="width: 15%;">Data</th>
          <th style="width: 50%;">Descrição</th>
          <th style="text-align: right; width: 20%;">Valor</th>
          <th style="text-align: center; width: 15%;">Ação</th>
        </tr>
      </thead>
      <tbody id="corpoDespesas">
        <tr><td colspan="4" class="empty-state">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="config.js"></script>
<script src="auth-utils.js"></script>
<script src="auth.js"></script>
<script>
  const mesesNomes = ['', 'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
  let chartDiario = null;
  let chartCategoria = null;
  let todasDespesas = [];
  let despesasDoMes = [];
  let categoriaFiltrada = null;  // null = mostrar todas
  let nomeFiltrado = '';  // string vazia = mostrar todas

  document.addEventListener('DOMContentLoaded', async () => {
    await carregarTodasDespesas();
    renderizarDetalhes();
  });

  async function carregarTodasDespesas() {
    try {
      console.log('📥 Carregando despesas.json...');
      const dados = await buscarArquivo("despesas.json");
      todasDespesas = Array.isArray(dados) ? dados : (dados.dados || []);
      console.log(`✅ Carregadas ${todasDespesas.length} despesas`);
    } catch (erro) {
      console.error('❌ Erro ao carregar:', erro);
      document.getElementById('corpoDespesas').innerHTML = `
        <tr><td colspan="4" class="empty-state">⚠️ Erro ao carregar dados</td></tr>
      `;
    }
  }

  function renderizarDetalhes() {
    // Pegar mês e ano da URL ou window
    const urlParams = new URLSearchParams(window.location.search);
    let mes = parseInt(urlParams.get('mes')) || window.mesSelecionado;
    let ano = parseInt(urlParams.get('ano')) || window.anoSelecionado;

    // Se ainda não tiver, tenta pegar do window
    if (!mes || !ano) {
      mes = window.mesSelecionado;
      ano = window.anoSelecionado;
    }

    console.log(`📋 Filtrando ${mesesNomes[mes]}/${ano}`);

    // Filtrar despesas do mês/ano selecionado
    despesasDoMes = todasDespesas.filter(d => d.Mes === mes && d.Ano === ano);

    console.log(`📊 Encontradas ${despesasDoMes.length} despesas`);

    // Atualizar título
    document.getElementById('headerTitle').textContent = `📋 ${mesesNomes[mes]} de ${ano}`;

    if (despesasDoMes.length === 0) {
      document.getElementById('corpoDespesas').innerHTML = '<tr><td colspan="4" class="empty-state">Nenhuma despesa encontrada</td></tr>';
      document.getElementById('totalDespesas').textContent = 'R$ 0,00';
      return;
    }

    // Renderizar filtros de categoria
    renderizarFiltros();

    // Renderizar detalhes
    atualizarVisualizacao();
  }

  function renderizarFiltros() {
    // Obter todas as categorias únicas
    const categorias = [...new Set(despesasDoMes.map(d => d.Categoria))].sort();
    
    const filtroSelect = document.getElementById('filtroSelect');
    
    // Limpar options existentes (manter só a primeira)
    while (filtroSelect.options.length > 1) {
      filtroSelect.remove(1);
    }
    
    // Adicionar opções por categoria
    categorias.forEach(cat => {
      const total = despesasDoMes
        .filter(d => d.Categoria === cat)
        .reduce((sum, d) => sum + (d.Valor || 0), 0);
      
      const option = document.createElement('option');
      option.value = cat;
      option.textContent = `🏷️ ${cat} (${formatarMoeda(total)})`;
      filtroSelect.appendChild(option);
    });
  }

  function filtrarCategoria(categoria) {
    categoriaFiltrada = categoria === '' ? null : categoria;
    atualizarVisualizacao();
  }

  function filtrarPorNome(nome) {
    nomeFiltrado = nome.toLowerCase().trim();
    console.log(`🔍 Filtrando por nome: "${nomeFiltrado}"`);
    atualizarVisualizacao();
  }

  function resetarFiltro() {
    categoriaFiltrada = null;
    nomeFiltrado = '';
    document.getElementById('filtroSelect').value = '';
    document.getElementById('filtroNome').value = '';
    atualizarVisualizacao();
  }

  function atualizarVisualizacao() {
    // Filtrar dados conforme categoria e nome selecionados
    let despesasFiltradas = despesasDoMes;
    
    if (categoriaFiltrada) {
      despesasFiltradas = despesasFiltradas.filter(d => d.Categoria === categoriaFiltrada);
    }
    
    if (nomeFiltrado) {
      despesasFiltradas = despesasFiltradas.filter(d => 
        d.Descricao.toLowerCase().includes(nomeFiltrado)
      );
    }

    console.log(`📊 Despesas filtradas: ${despesasFiltradas.length}`);

    // Atualizar resumo
    const total = despesasFiltradas.reduce((sum, d) => sum + (d.Valor || 0), 0);
    const qtd = despesasFiltradas.length;
    
    let resumoText = '';
    let filtros = [];
    if (categoriaFiltrada) filtros.push(`<strong>${categoriaFiltrada}</strong>`);
    if (nomeFiltrado) filtros.push(`<strong>"${nomeFiltrado}"</strong>`);
    
    if (filtros.length > 0) {
      resumoText = `📊 Filtro: ${filtros.join(' + ')} | Total: <strong>${formatarMoeda(total)}</strong> | Lançamentos: <strong>${qtd}</strong>`;
    } else {
      resumoText = `📊 Sem filtro | Total: <strong>${formatarMoeda(total)}</strong> | Lançamentos: <strong>${qtd}</strong>`;
    }
    
    document.getElementById('filtroResumo').innerHTML = resumoText;

    // Calcular totais
    if (despesasFiltradas.length === 0) {
      document.getElementById('corpoDespesas').innerHTML = '<tr><td colspan="4" class="empty-state">Nenhuma despesa encontrada</td></tr>';
      document.getElementById('totalDespesas').textContent = 'R$ 0,00';
      return;
    }

    const media = total / qtd;
    const maior = Math.max(...despesasFiltradas.map(d => d.Valor || 0));
    const menor = Math.min(...despesasFiltradas.map(d => d.Valor || 0));
    const maiorDesp = despesasFiltradas.find(d => d.Valor === maior);
    const menorDesp = despesasFiltradas.find(d => d.Valor === menor);

    document.getElementById('totalDespesas').textContent = formatarMoeda(total);
    document.getElementById('qtdDespesas').textContent = `${qtd} lançamento${qtd !== 1 ? 's' : ''}`;
    document.getElementById('mediaDespesas').textContent = formatarMoeda(media);
    document.getElementById('maiorDespesa').textContent = formatarMoeda(maior);
    document.getElementById('maiorDesc').textContent = maiorDesp ? maiorDesp.Descricao.substring(0, 20) : '-';
    document.getElementById('menorDespesa').textContent = formatarMoeda(menor);
    document.getElementById('menorDesc').textContent = menorDesp ? menorDesp.Descricao.substring(0, 20) : '-';

    // Ordenar por data decrescente
    const despesasOrdenadas = [...despesasFiltradas].sort((a, b) => 
      new Date(b.DataCadastro) - new Date(a.DataCadastro)
    );

    // Renderizar tabela
    const corpoDespesas = document.getElementById('corpoDespesas');
    corpoDespesas.innerHTML = despesasOrdenadas.map((d, idx) => `
      <tr>
        <td class="data">${formatarData(d.DataCadastro)}</td>
        <td class="descricao">${d.Descricao}</td>
        <td class="valor">${formatarMoeda(d.Valor)}</td>
        <td style="text-align: center;">
          <button class="btn" style="padding: 6px 12px; font-size: 12px;" onclick="mostrarDetalheDespesa('${d.Id}', '${d.Descricao.replace(/'/g, "\\'")}', ${d.Valor}, '${d.DataCadastro}', '${d.Categoria}')">👁️</button>
        </td>
      </tr>
    `).join('');

    // Auto-scroll para o primeiro resultado se houver filtro de nome
    if (nomeFiltrado && despesasOrdenadas.length > 0) {
      setTimeout(() => {
        const primeiraLinha = corpoDespesas.querySelector('tr');
        if (primeiraLinha) {
          primeiraLinha.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 100);
    }

    // Renderizar gráficos
    renderizarGraficoDiario(despesasOrdenadas);
    renderizarGraficoCategoria();
  }

  function renderizarGraficoDiario(despesas) {
    // Agrupar por dia
    const dias = {};
    despesas.forEach(d => {
      const data = formatarData(d.DataCadastro);
      dias[data] = (dias[data] || 0) + (d.Valor || 0);
    });

    const labels = Object.keys(dias).sort((a, b) => {
      const [diaA, mesA, anoA] = a.split('/').map(Number);
      const [diaB, mesB, anoB] = b.split('/').map(Number);
      return new Date(anoA, mesA - 1, diaA) - new Date(anoB, mesB - 1, diaB);
    });
    const valores = labels.map(l => dias[l]);

    const ctx = document.getElementById('chartDiario').getContext('2d');
    
    if (chartDiario) {
      chartDiario.destroy();
    }

    chartDiario = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Despesas por Dia',
          data: valores,
          borderColor: '#1fa37a',
          backgroundColor: 'rgba(31,163,122,0.1)',
          borderWidth: 2,
          fill: true,
          tension: 0.4,
          pointBackgroundColor: '#d4af37',
          pointBorderColor: '#1fa37a',
          pointRadius: 5,
          pointHoverRadius: 7
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: { color: '#7cf0c2', font: { size: 12 } }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { color: '#7cf0c2' },
            grid: { color: 'rgba(31,163,122,0.1)' }
          },
          x: {
            ticks: { color: '#7cf0c2' },
            grid: { color: 'rgba(31,163,122,0.1)' }
          }
        }
      }
    });
  }

  function renderizarGraficoCategoria() {
    // Se tiver filtro de categoria ou nome, não mostrar gráfico de categorias
    if (categoriaFiltrada || nomeFiltrado) {
      document.getElementById('chartCategoria').style.display = 'none';
      return;
    }
    
    document.getElementById('chartCategoria').style.display = 'block';

    // Agrupar por categoria
    const categorias = {};
    despesasDoMes.forEach(d => {
      const cat = d.Categoria || 'SEM CATEGORIA';
      categorias[cat] = (categorias[cat] || 0) + (d.Valor || 0);
    });

    const labels = Object.keys(categorias).sort();
    const valores = labels.map(l => categorias[l]);

    // Gerar cores variadas
    const cores = [
      '#1fa37a', '#d4af37', '#ef5350', '#42a5f5',
      '#66bb6a', '#ffa726', '#ab47bc', '#29b6f6',
      '#ec407a', '#9ccc65', '#26a69a', '#78909c'
    ];
    const backgroundColors = labels.map((_, i) => cores[i % cores.length]);

    const ctx = document.getElementById('chartCategoria').getContext('2d');
    
    if (chartCategoria) {
      chartCategoria.destroy();
    }

    chartCategoria = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          data: valores,
          backgroundColor: backgroundColors,
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              color: '#7cf0c2',
              font: { size: 11 },
              padding: 15
            }
          },
          tooltip: {
            callbacks: {
              label: (context) => {
                const total = context.dataset.data.reduce((a, b) => a + b, 0);
                const percentage = ((context.parsed / total) * 100).toFixed(1);
                return `${context.label}: ${formatarMoeda(context.parsed)} (${percentage}%)`;
              }
            }
          }
        }
      }
    });
  }

  function mostrarDetalheDespesa(id, descricao, valor, dataCadastro, categoria) {
    alert(`
🏷️ ID: ${id}
📅 Data: ${formatarData(dataCadastro)}
📝 Descrição: ${descricao}
💰 Valor: ${formatarMoeda(valor)}
🏷️ Categoria: ${categoria}
    `);
  }

  function formatarData(dataString) {
    try {
      const data = new Date(dataString);
      return data.toLocaleDateString('pt-BR');
    } catch {
      return dataString;
    }
  }

  function formatarMoeda(valor) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor || 0);
  }
</script>
