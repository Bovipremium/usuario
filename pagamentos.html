<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamentos - Sistema Empresarial</title>
  
  <!-- 🔐 PROTEÇÃO DE ACESSO -->
  <script>
    const deviceId = localStorage.getItem('deviceId');
    const autenticado = localStorage.getItem('autenticado');
    if (!deviceId || autenticado !== 'true') {
      window.location.replace('keygate.html');
    }
  </script>

  <link rel="icon" type="image/png" href="assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidebar-dock.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0e1f1a, #050b09 70%);
      color: #e5f3ee;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 6%;
      border-bottom: 1px solid rgba(255,255,255,.08);
      z-index: 2;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 22px;
      font-weight: 600;
      z-index: 1;
      color: #e5f3ee;
    }

    .logo-area img {
      height: 48px;
      max-width: 160px;
      object-fit: contain;
    }

    .header-right {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .btn-voltar {
      padding: 10px 20px;
      background: rgba(255,255,255,.1);
      color: #1fa37a;
      border: 1px solid rgba(31,163,122,.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .btn-voltar:hover {
      background: rgba(31,163,122,.15);
      border-color: #1fa37a;
    }

    .btn-logout {
      padding: 10px 20px;
      background: linear-gradient(135deg, #1fa37a, #0f6b52);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-logout:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(31,163,122,.3);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 6% 40px;
      z-index: 1;
    }

    .content {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px;
      padding: 40px;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .header-content h2 {
      color: #1fa37a;
      font-size: 1.8rem;
      margin: 0;
    }

    .filtros-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(255,255,255,.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.1);
    }

    .filtro-item {
      display: flex;
      flex-direction: column;
    }

    .filtro-item label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #8fb9ac;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filtro-item input,
    .filtro-item select {
      padding: 10px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px;
      background: rgba(255,255,255,.08);
      color: #e5f3ee;
      font-size: 13px;
      transition: all 0.3s;
    }

    .filtro-item input:focus,
    .filtro-item select:focus {
      outline: none;
      border-color: #1fa37a;
      background: rgba(31,163,122,.1);
    }

    .btn-limpar {
      padding: 10px 20px;
      background: #6c757d;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      align-self: flex-end;
      margin-top: 24px;
    }

    .btn-limpar:hover {
      background: #5a6268;
      transform: translateY(-2px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table thead {
      background: rgba(31,163,122,.15);
      border-bottom: 2px solid rgba(31,163,122,.5);
    }

    table th,
    table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.1);
      color: #e5f3ee;
    }

    table th {
      color: #1fa37a;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    table tbody tr {
      cursor: pointer;
      transition: all 0.2s;
    }

    table tbody tr:hover {
      background: rgba(31,163,122,.2);
    }

    /* Cores para status de pagamento */
    .status-vermelho {
      background: rgba(220, 50, 50, 0.25) !important;
    }

    .status-verde {
      background: rgba(50, 200, 50, 0.25) !important;
    }

    .status-amarelo {
      background: rgba(255, 200, 0, 0.25) !important;
    }

    .empty-message {
      text-align: center;
      color: #8fb9ac;
      padding: 40px;
      font-size: 16px;
    }

    .resumo-stats {
      margin-top: 20px;
      padding: 15px;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: rgba(31,163,122,.08);
      padding: 12px;
      border-radius: 8px;
      border-left: 3px solid #1fa37a;
    }

    .stat-card p {
      color: #8fb9ac;
      margin-bottom: 3px;
      font-size: 10px;
      text-transform: uppercase;
    }

    .stat-card h3 {
      color: #1fa37a;
      margin: 0;
      font-size: 16px;
    }

    .main-content {
      margin-left: 60px;
    }

    @media (max-width: 768px) {
      .filtros-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 15px;
      }

      .header-content {
        flex-direction: column;
        align-items: flex-start;
      }

      .main-content {
        margin-left: 50px;
      }
    }

    @media (max-width: 480px) {
      .filtros-grid {
        grid-template-columns: 1fr;
      }

      .main-content {
        margin-left: 45px;
      }

      table {
        font-size: 12px;
      }

      table th, table td {
        padding: 10px 8px;
      }
    }
  </style>
  <script src="modais-globais.js"></script>
</head>
<body>
  <div class="sidebar-dock" id="sidebar"></div>

  <div class="header">
    <div class="logo-area">
      <img src="assets/img/logo.png" alt="Logo">
      Sistema Empresarial
    </div>
    <div class="header-right">
      <button class="btn-voltar" onclick="voltarDashboard()">← Dashboard</button>
      <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>
  </div>

  <div class="main-content">
    <div class="container">
      <div class="content">
        <div class="header-content">
          <h2>💳 Pagamentos</h2>
          <div style="display: flex; gap: 10px;">
            <button class="btn-voltar" onclick="window.location.href='contas.html'" style="background: rgba(31,163,122,.2); border-color: #1fa37a;">📊 Contas</button>
            <button class="btn-voltar" onclick="window.location.href='relatorio-pagamentos.html'" style="background: rgba(31,163,122,.2); border-color: #1fa37a;">📈 Relatório</button>
          </div>
        </div>

        <!-- FILTROS -->
        <div class="filtros-grid">
          <div class="filtro-item">
            <label>Nome do Cliente</label>
            <input type="text" id="filtroNome" placeholder="Pesquisar..." onkeyup="aplicarFiltros()" style="width: 100%;">
          </div>

          <div class="filtro-item">
            <label>Vencimento Boleto (De)</label>
            <input type="date" id="filtroDataVendaDe" onchange="aplicarFiltros()">
          </div>

          <div class="filtro-item">
            <label>Vencimento Boleto (Até)</label>
            <input type="date" id="filtroDataVendaAte" onchange="aplicarFiltros()">
          </div>

          <div class="filtro-item">
            <label>Data Cadastro (De)</label>
            <input type="date" id="filtroDataCadastroDe" onchange="aplicarFiltros()">
          </div>

          <div class="filtro-item">
            <label>Data Cadastro (Até)</label>
            <input type="date" id="filtroDataCadastroAte" onchange="aplicarFiltros()">
          </div>

          <div class="filtro-item">
            <label>Mín. de Boletos</label>
            <input type="number" id="filtroMinVendas" placeholder="0" onchange="aplicarFiltros()" min="0">
          </div>

          <div class="filtro-item">
            <label>Status Pagamento</label>
            <select id="filtroStatusPagamento" onchange="aplicarFiltros()">
              <option value="">Todos</option>
              <option value="pago">Pago</option>
              <option value="aberto">Em aberto</option>
              <option value="pendente">A vencer</option>
              <option value="vencido">Vencido</option>
            </select>
          </div>

          <div style="display: flex; gap: 5px; align-items: flex-end;">
            <button onclick="limparFiltros()" class="btn-limpar" style="flex: 1;">🔄 Limpar</button>
          </div>
        </div>

        <div id="container-pagamentos">
          <div class="empty-message">Carregando pagamentos...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  
  
  <script src="auth-utils.js"></script>
<script src="auth.js"></script>
<script src="sidebar-dock.js"></script>
  
  <script>
    let clientesGlobal = [];
    let clientesFiltrados = [];

    function voltarDashboard() {
      window.location.href = 'index.html';
    }

    function fazerLogout() {
      localStorage.removeItem('autenticado');
      localStorage.removeItem('token');
      localStorage.removeItem('deviceId');
      window.location.replace('keygate.html');
    }

    function normalizarTexto(valor) {
      return String(valor || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim();
    }

    function parseDataLocal(valor) {
      if (!valor) return null;

      if (valor instanceof Date && !isNaN(valor)) {
        return new Date(valor.getFullYear(), valor.getMonth(), valor.getDate());
      }

      const texto = String(valor).trim();

      // yyyy-mm-dd
      const iso = texto.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (iso) {
        return new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));
      }

      // dd/mm/yyyy
      const br = texto.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (br) {
        return new Date(Number(br[3]), Number(br[2]) - 1, Number(br[1]));
      }

      const data = new Date(texto);
      if (isNaN(data)) return null;
      return new Date(data.getFullYear(), data.getMonth(), data.getDate());
    }

    function formatarDataBR(valor) {
      const d = parseDataLocal(valor);
      if (!d) return '-';
      return d.toLocaleDateString('pt-BR');
    }

    function formatarMoeda(valor) {
      return (Number(valor) || 0).toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      });
    }

    function hojeLocal() {
      const h = new Date();
      h.setHours(0, 0, 0, 0);
      return h;
    }

    function obterValorParcela(parcela) {
      return Number(
        parcela.Valor ??
        parcela.valor ??
        parcela.ValorParcela ??
        parcela.valorParcela ??
        parcela.Total ??
        parcela.total ??
        0
      ) || 0;
    }

    function obterDataVencimentoParcela(parcela) {
      return parcela.DataVencimento ||
             parcela.dataVencimento ||
             parcela.Vencimento ||
             parcela.vencimento ||
             parcela.Data ||
             parcela.data ||
             '';
    }

    function parcelaEstaPaga(parcela) {
      return parcela.Pago === true ||
             parcela.Pago === 'true' ||
             parcela.pago === true ||
             parcela.pago === 'true' ||
             normalizarTexto(parcela.Status || parcela.status || '') === 'pago';
    }

    function statusParcela(parcela) {
      if (parcelaEstaPaga(parcela)) return 'pago';

      const dataVenc = parseDataLocal(obterDataVencimentoParcela(parcela));
      if (!dataVenc) return 'aberto';

      return dataVenc < hojeLocal() ? 'vencido' : 'pendente';
    }

    function numeroParcela(parcela, idx) {
      return parcela.Numero ||
             parcela.numero ||
             parcela.Parcela ||
             parcela.parcela ||
             parcela.N ||
             (idx + 1);
    }

    function vendaId(venda, idx) {
      return venda.Id ||
             venda.id ||
             venda.NumeroVenda ||
             venda.numeroVenda ||
             venda.NF ||
             venda.NumeroNF ||
             venda.numeroNF ||
             `Venda ${idx + 1}`;
    }

    function obterTodosBoletos(cliente) {
      const boletos = [];

      (cliente.Vendas || []).forEach((venda, vendaIdx) => {
        const parcelas = Array.isArray(venda.Parcelas) ? venda.Parcelas : [];

        parcelas.forEach((parcela, parcelaIdx) => {
          const dataVencimento = obterDataVencimentoParcela(parcela);
          const status = statusParcela(parcela);
          const valor = obterValorParcela(parcela);

          boletos.push({
            cliente,
            venda,
            parcela,
            clienteNome: cliente.Nome || cliente.nome || 'Sem nome',
            vendaId: vendaId(venda, vendaIdx),
            numeroParcela: numeroParcela(parcela, parcelaIdx),
            dataVencimento,
            dataVencimentoObj: parseDataLocal(dataVencimento),
            valor,
            pago: parcelaEstaPaga(parcela),
            status
          });
        });
      });

      return boletos;
    }

    function obterBoletosFiltradosCliente(cliente) {
      const nome = normalizarTexto(document.getElementById('filtroNome')?.value || '');
      const vencimentoDe = document.getElementById('filtroDataVendaDe')?.value || '';
      const vencimentoAte = document.getElementById('filtroDataVendaAte')?.value || '';
      const dataCadastroDe = document.getElementById('filtroDataCadastroDe')?.value || '';
      const dataCadastroAte = document.getElementById('filtroDataCadastroAte')?.value || '';
      const statusPagamento = document.getElementById('filtroStatusPagamento')?.value || '';

      // Nome continua filtrando cliente.
      if (nome && !normalizarTexto(cliente.Nome || cliente.nome || '').includes(nome)) {
        return [];
      }

      // Data de cadastro continua filtrando cliente, pois é dado do cliente.
      if (dataCadastroDe || dataCadastroAte) {
        const dataCadastro = parseDataLocal(cliente.DataCadastro || cliente.dataCadastro || '');
        if (!dataCadastro) return [];

        const de = parseDataLocal(dataCadastroDe);
        const ate = parseDataLocal(dataCadastroAte);

        if (de && dataCadastro < de) return [];
        if (ate && dataCadastro > ate) return [];
      }

      let boletos = obterTodosBoletos(cliente);

      // IMPORTANTE:
      // Em pagamentos.html, data é filtro de BOLETO/PARCELA,
      // então usa DataVencimento, não DataVenda.
      if (vencimentoDe || vencimentoAte) {
        const de = parseDataLocal(vencimentoDe);
        const ate = parseDataLocal(vencimentoAte);

        boletos = boletos.filter(b => {
          if (!b.dataVencimentoObj) return false;
          if (de && b.dataVencimentoObj < de) return false;
          if (ate && b.dataVencimentoObj > ate) return false;
          return true;
        });
      }

      if (statusPagamento) {
        boletos = boletos.filter(b => {
          if (statusPagamento === 'pago') return b.status === 'pago';
          if (statusPagamento === 'aberto') return b.status === 'pendente' || b.status === 'vencido' || b.status === 'aberto';
          if (statusPagamento === 'pendente') return b.status === 'pendente' || b.status === 'aberto';
          if (statusPagamento === 'vencido') return b.status === 'vencido';
          return true;
        });
      }

      return boletos;
    }

    async function carregarPagamentos() {
      try {
        console.log('📥 Carregando clientes.json via buscarArquivo...');
        let dados = await buscarArquivo('clientes.json');

        console.log('📊 Tipo de dados retornado:', typeof dados);
        console.log('📊 É array?', Array.isArray(dados));

        if (!Array.isArray(dados)) {
          console.warn('⚠️ Dados não é array, tentando extrair array...');
          dados = dados.dados || dados[0] || [];
        }

        clientesGlobal = Array.isArray(dados) ? dados : [];
        console.log(`✅ ${clientesGlobal.length} clientes carregados`);

        aplicarFiltros();
      } catch (error) {
        console.error('❌ Erro ao carregar pagamentos:', error);
        console.error('Stack trace:', error.stack);
        document.getElementById('container-pagamentos').innerHTML = 
          '<div class="empty-message">❌ Erro ao carregar pagamentos: ' + error.message + '</div>';
      }
    }

    function renderizarTabela() {
      const container = document.getElementById('container-pagamentos');

      const linhas = clientesFiltrados
        .map(cliente => ({
          cliente,
          boletos: cliente.__boletosFiltrados || []
        }))
        .filter(item => item.boletos.length > 0);

      if (linhas.length === 0) {
        container.innerHTML = '<div class="empty-message">📭 Nenhum boleto encontrado no filtro informado</div>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th style="min-width: 30px; text-align: center;">▶</th>
              <th>Cliente</th>
              <th style="text-align: center;">Vendas c/ Boleto</th>
              <th style="text-align: center;">Boletos Filtrados</th>
              <th style="text-align: center;">Valor Filtrado</th>
              <th style="text-align: center;">Pagos</th>
              <th style="text-align: center;">Vencidos</th>
            </tr>
          </thead>
          <tbody id="tbody-pagamentos">
      `;

      let totalClientes = 0;
      let totalBoletosGeral = 0;
      let totalPagosGeral = 0;
      let totalVencidosGeral = 0;
      let valorTotalGeral = 0;
      let valorPagoGeral = 0;
      let valorVencidoGeral = 0;

      linhas.forEach(({ cliente, boletos }) => {
        const vendasComBoleto = new Set(boletos.map(b => b.vendaId)).size;
        const totalBoletos = boletos.length;
        const totalPagos = boletos.filter(b => b.status === 'pago').length;
        const totalVencidos = boletos.filter(b => b.status === 'vencido').length;
        const valorTotal = boletos.reduce((s, b) => s + b.valor, 0);
        const valorPago = boletos.filter(b => b.status === 'pago').reduce((s, b) => s + b.valor, 0);
        const valorVencido = boletos.filter(b => b.status === 'vencido').reduce((s, b) => s + b.valor, 0);

        let corFundo = 'rgba(255,255,255,.02)';
        if (totalBoletos > 0) {
          if (totalVencidos > 0) corFundo = 'rgba(220, 50, 50, 0.25)';
          else if (totalPagos === totalBoletos) corFundo = 'rgba(50, 200, 50, 0.25)';
          else corFundo = 'rgba(255, 200, 0, 0.25)';
        }

        const nomeSeguro = String(cliente.Nome || '').replace(/'/g, "\\'");

        html += `<tr style="background-color: ${corFundo}; cursor: pointer;" onclick="abrirDetalhesCliente('${nomeSeguro}')">`;
        html += `<td style="text-align: center;">▶</td>`;
        html += `<td><strong>${cliente.Nome || '-'}</strong><br><small style="color:#8fb9ac;">Primeiro venc.: ${formatarDataBR(boletos[0]?.dataVencimento)}</small></td>`;
        html += `<td style="text-align: center;">${vendasComBoleto}</td>`;
        html += `<td style="text-align: center;">${totalBoletos}</td>`;
        html += `<td style="text-align: center;"><strong>${formatarMoeda(valorTotal)}</strong></td>`;
        html += `<td style="text-align: center;"><strong>${totalPagos}</strong><br><small>${formatarMoeda(valorPago)}</small></td>`;
        html += `<td style="text-align: center;"><strong>${totalVencidos}</strong><br><small>${formatarMoeda(valorVencido)}</small></td>`;
        html += `</tr>`;

        totalClientes++;
        totalBoletosGeral += totalBoletos;
        totalPagosGeral += totalPagos;
        totalVencidosGeral += totalVencidos;
        valorTotalGeral += valorTotal;
        valorPagoGeral += valorPago;
        valorVencidoGeral += valorVencido;
      });

      html += `</tbody></table>`;

      html += `
        <div class="resumo-stats">
          <div class="stat-card">
            <p>Clientes com Boletos</p>
            <h3>${totalClientes}</h3>
          </div>
          <div class="stat-card">
            <p>Boletos Filtrados</p>
            <h3>${totalBoletosGeral}</h3>
          </div>
          <div class="stat-card">
            <p>Valor Filtrado</p>
            <h3>${formatarMoeda(valorTotalGeral)}</h3>
          </div>
          <div class="stat-card" style="border-left-color: #90ee90;">
            <p style="color: #90ee90;">Boletos Pagos</p>
            <h3 style="color: #90ee90;">${totalPagosGeral}</h3>
            <small style="color:#8fb9ac;">${formatarMoeda(valorPagoGeral)}</small>
          </div>
          <div class="stat-card" style="border-left-color: #d9534f;">
            <p style="color: #d9534f;">Boletos Vencidos</p>
            <h3 style="color: #d9534f;">${totalVencidosGeral}</h3>
            <small style="color:#8fb9ac;">${formatarMoeda(valorVencidoGeral)}</small>
          </div>
          <div class="stat-card" style="border-left-color: #f0ad4e;">
            <p style="color: #f0ad4e;">Em Aberto</p>
            <h3 style="color: #f0ad4e;">${totalBoletosGeral - totalPagosGeral}</h3>
            <small style="color:#8fb9ac;">${formatarMoeda(valorTotalGeral - valorPagoGeral)}</small>
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    function abrirDetalhesCliente(nomeCliente) {
      const cliente = clientesGlobal.find(c => c.Nome === nomeCliente);
      if (cliente) {
        sessionStorage.setItem('clienteSelecionado', JSON.stringify(cliente));
        localStorage.setItem('clienteSelecionado', JSON.stringify(cliente));
        window.open('pagamentos-detalhes.html', '_blank');
      }
    }

    function aplicarFiltros() {
      const minBoletos = parseInt(document.getElementById('filtroMinVendas')?.value || '0') || 0;

      clientesFiltrados = clientesGlobal
        .map(cliente => {
          const boletos = obterBoletosFiltradosCliente(cliente);

          return {
            ...cliente,
            __boletosFiltrados: boletos
          };
        })
        .filter(cliente => {
          if (minBoletos > 0 && cliente.__boletosFiltrados.length < minBoletos) return false;
          return cliente.__boletosFiltrados.length > 0;
        });

      console.log('🔎 Filtro de Pagamentos por BOLETOS:', {
        clientes: clientesFiltrados.length,
        boletos: clientesFiltrados.reduce((s, c) => s + c.__boletosFiltrados.length, 0),
        status: document.getElementById('filtroStatusPagamento')?.value || 'todos',
        vencimentoDe: document.getElementById('filtroDataVendaDe')?.value || '',
        vencimentoAte: document.getElementById('filtroDataVendaAte')?.value || ''
      });

      renderizarTabela();
    }

    function limparFiltros() {
      document.getElementById('filtroNome').value = '';
      document.getElementById('filtroDataVendaDe').value = '';
      document.getElementById('filtroDataVendaAte').value = '';
      document.getElementById('filtroDataCadastroDe').value = '';
      document.getElementById('filtroDataCadastroAte').value = '';
      document.getElementById('filtroMinVendas').value = '';
      document.getElementById('filtroStatusPagamento').value = '';

      aplicarFiltros();
    }

    // Carregar ao iniciar
    carregarPagamentos();
  </script>
<script src="mascaras-globais.js"></script>
<script src="alertas-ligacoes.js"></script>
</body>
