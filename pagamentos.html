<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamentos - Sistema Empresarial</title>
  
  <!-- 🔐 PROTEÇÃO DE ACESSO -->
  <script>
    const deviceId = localStorage.getItem('deviceId');
    const autenticado = localStorage.getItem('autenticado');
    if (!deviceId || autenticado !== 'true') {
      window.location.replace('keygate.html');
    }
  </script>

  <link rel="icon" type="image/png" href="assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidebar-dock.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0e1f1a, #050b09 70%);
      color: #e5f3ee;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 6%;
      border-bottom: 1px solid rgba(255,255,255,.08);
      z-index: 2;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 22px;
      font-weight: 600;
      z-index: 1;
      color: #e5f3ee;
    }

    .logo-area img {
      height: 48px;
      max-width: 160px;
      object-fit: contain;
    }

    .header-right {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .btn-voltar {
      padding: 10px 20px;
      background: rgba(255,255,255,.1);
      color: #1fa37a;
      border: 1px solid rgba(31,163,122,.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .btn-voltar:hover {
      background: rgba(31,163,122,.15);
      border-color: #1fa37a;
    }

    .btn-logout {
      padding: 10px 20px;
      background: linear-gradient(135deg, #1fa37a, #0f6b52);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-logout:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(31,163,122,.3);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 6% 40px;
      z-index: 1;
    }

    .content {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px;
      padding: 40px;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .header-content h2 {
      color: #1fa37a;
      font-size: 1.8rem;
      margin: 0;
    }

    .filtros-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(255,255,255,.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.1);
    }

    .filtro-item {
      display: flex;
      flex-direction: column;
    }

    .filtro-item label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #8fb9ac;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filtro-item input,
    .filtro-item select {
      padding: 10px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px;
      background: rgba(255,255,255,.08);
      color: #e5f3ee;
      font-size: 13px;
      transition: all 0.3s;
    }

    .filtro-item input:focus,
    .filtro-item select:focus {
      outline: none;
      border-color: #1fa37a;
      background: rgba(31,163,122,.1);
    }

    .btn-limpar {
      padding: 10px 20px;
      background: #6c757d;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      align-self: flex-end;
      margin-top: 24px;
    }

    .btn-limpar:hover {
      background: #5a6268;
      transform: translateY(-2px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table thead {
      background: rgba(31,163,122,.15);
      border-bottom: 2px solid rgba(31,163,122,.5);
    }

    table th,
    table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.1);
      color: #e5f3ee;
    }

    table th {
      color: #1fa37a;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    table tbody tr {
      cursor: pointer;
      transition: all 0.2s;
    }

    table tbody tr:hover {
      background: rgba(31,163,122,.2);
    }

    /* Cores para status de pagamento */
    .status-vermelho {
      background: rgba(220, 50, 50, 0.25) !important;
    }

    .status-verde {
      background: rgba(50, 200, 50, 0.25) !important;
    }

    .status-amarelo {
      background: rgba(255, 200, 0, 0.25) !important;
    }

    .empty-message {
      text-align: center;
      color: #8fb9ac;
      padding: 40px;
      font-size: 16px;
    }

    .resumo-stats {
      margin-top: 20px;
      padding: 15px;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: rgba(31,163,122,.08);
      padding: 12px;
      border-radius: 8px;
      border-left: 3px solid #1fa37a;
    }

    .stat-card p {
      color: #8fb9ac;
      margin-bottom: 3px;
      font-size: 10px;
      text-transform: uppercase;
    }

    .stat-card h3 {
      color: #1fa37a;
      margin: 0;
      font-size: 16px;
    }

    .main-content {
      margin-left: 60px;
    }

    @media (max-width: 768px) {
      .filtros-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 15px;
      }

      .header-content {
        flex-direction: column;
        align-items: flex-start;
      }

      .main-content {
        margin-left: 50px;
      }
    }

    @media (max-width: 480px) {
      .filtros-grid {
        grid-template-columns: 1fr;
      }

      .main-content {
        margin-left: 45px;
      }

      table {
        font-size: 12px;
      }

      table th, table td {
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar-dock" id="sidebar"></div>

  <div class="header">
    <div class="logo-area">
      <img src="assets/img/logo.png" alt="Logo">
      Sistema Empresarial
    </div>
    <div class="header-right">
      <button class="btn-voltar" onclick="voltarDashboard()">← Dashboard</button>
      <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>
  </div>

  <div class="main-content">
    <div class="container">
      <div class="content">
        <div class="header-content">
          <h2>💳 Pagamentos</h2>
        </div>

        <!-- FILTROS -->
        <div class="filtros-grid">
          <div class="filtro-item">
            <label>Nome do Cliente</label>
            <input type="text" id="filtroNome" placeholder="Pesquisar..." onkeyup="aplicarFiltros()" style="width: 100%;">
          </div>

          <div class="filtro-item">
            <label>Data Venda (De)</label>
            <input type="date" id="filtroDataVendaDe" onchange="aplicarFiltros()">
          </div>

          <div class="filtro-item">
            <label>Data Venda (Até)</label>
            <input type="date" id="filtroDataVendaAte" onchange="aplicarFiltros()">
          </div>

          <div class="filtro-item">
            <label>Data Cadastro (De)</label>
            <input type="date" id="filtroDataCadastroDe" onchange="aplicarFiltros()">
          </div>

          <div class="filtro-item">
            <label>Data Cadastro (Até)</label>
            <input type="date" id="filtroDataCadastroAte" onchange="aplicarFiltros()">
          </div>

          <div class="filtro-item">
            <label>Mín. de Vendas</label>
            <input type="number" id="filtroMinVendas" placeholder="0" onchange="aplicarFiltros()" min="0">
          </div>

          <div class="filtro-item">
            <label>Status Pagamento</label>
            <select id="filtroStatusPagamento" onchange="aplicarFiltros()">
              <option value="">Todos</option>
              <option value="pago">Pago</option>
              <option value="pendente">Pendente</option>
              <option value="vencido">Vencido</option>
            </select>
          </div>

          <div style="display: flex; gap: 5px; align-items: flex-end;">
            <button onclick="limparFiltros()" class="btn-limpar" style="flex: 1;">🔄 Limpar</button>
          </div>
        </div>

        <div id="container-pagamentos">
          <div class="empty-message">Carregando pagamentos...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="auth-utils.js"></script>
  <script src="sidebar-dock.js"></script>
  
  <script>
    let clientesGlobal = [];
    let clientesFiltrados = [];

    function voltarDashboard() {
      window.location.href = 'index.html';
    }

    function fazerLogout() {
      localStorage.removeItem('autenticado');
      localStorage.removeItem('token');
      localStorage.removeItem('deviceId');
      window.location.replace('keygate.html');
    }

    async function carregarPagamentos() {
      try {
        console.log('📥 Carregando clientes.json via buscarArquivo...');
        let dados = await buscarArquivo('clientes.json');
        
        console.log('📊 Tipo de dados retornado:', typeof dados);
        console.log('📊 É array?', Array.isArray(dados));
        
        if (!Array.isArray(dados)) {
          console.warn('⚠️ Dados não é array, tentando extrair array...');
          dados = dados.dados || dados[0] || [];
        }
        
        clientesGlobal = Array.isArray(dados) ? dados : [];
        console.log(`✅ ${clientesGlobal.length} clientes carregados`);
        
        clientesFiltrados = [...clientesGlobal];
        renderizarTabela();
      } catch (error) {
        console.error('❌ Erro ao carregar pagamentos:', error);
        console.error('Stack trace:', error.stack);
        document.getElementById('container-pagamentos').innerHTML = 
          '<div class="empty-message">❌ Erro ao carregar pagamentos: ' + error.message + '</div>';
      }
    }

    function renderizarTabela() {
      const container = document.getElementById('container-pagamentos');
      
      if (clientesFiltrados.length === 0) {
        container.innerHTML = '<div class="empty-message">📭 Nenhum cliente encontrado</div>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th style="min-width: 30px; text-align: center;">▶</th>
              <th>Cliente</th>
              <th style="text-align: center;">Nº Vendas</th>
              <th style="text-align: center;">Total Boletos</th>
              <th style="text-align: center;">Pagos</th>
            </tr>
          </thead>
          <tbody id="tbody-pagamentos">
      `;

      let totalClientes = 0;
      let totalBoletos = 0;
      let totalPagos = 0;

      clientesFiltrados.forEach((cliente, idx) => {
        if (!cliente.Vendas || cliente.Vendas.length === 0) return;

        // Calcular totais
        let numVendas = cliente.Vendas.length;
        let totalBoletos = 0;
        let totalPagos = 0;

        cliente.Vendas.forEach(venda => {
          if (venda.Parcelas && Array.isArray(venda.Parcelas)) {
            totalBoletos += venda.Parcelas.length;
            totalPagos += venda.Parcelas.filter(p => p.Pago).length;
          }
        });

        // Determinar cor baseado em pagamento
        let corFundo = 'rgba(255,255,255,.02)';
        if (totalBoletos > 0) {
          if (totalPagos === 0) corFundo = 'rgba(220, 50, 50, 0.25)'; // VERMELHO
          else if (totalPagos === totalBoletos) corFundo = 'rgba(50, 200, 50, 0.25)'; // VERDE
          else corFundo = 'rgba(255, 200, 0, 0.25)'; // AMARELO
        }

        html += `<tr style="background-color: ${corFundo}; cursor: pointer;" onclick="abrirDetalhesCliente('${cliente.Nome}')">`;
        html += `<td style="text-align: center;">▶</td>`;
        html += `<td><strong>${cliente.Nome}</strong></td>`;
        html += `<td style="text-align: center;">${numVendas}</td>`;
        html += `<td style="text-align: center;">${totalBoletos}</td>`;
        html += `<td style="text-align: center;"><strong>${totalPagos}</strong></td>`;
        html += `</tr>`;

        totalClientes++;
      });

      html += `</tbody></table>`;
      
      // Adicionar resumo
      html += `
        <div class="resumo-stats">
          <div class="stat-card">
            <p>Total de Clientes</p>
            <h3>${totalClientes}</h3>
          </div>
          <div class="stat-card">
            <p>Total de Boletos</p>
            <h3>${totalBoletos}</h3>
          </div>
          <div class="stat-card" style="border-left-color: #90ee90;">
            <p style="color: #90ee90;">Boletos Pagos</p>
            <h3 style="color: #90ee90;">${totalPagos}</h3>
          </div>
          <div class="stat-card" style="border-left-color: #d9534f;">
            <p style="color: #d9534f;">Boletos Pendentes</p>
            <h3 style="color: #d9534f;">${totalBoletos - totalPagos}</h3>
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    function abrirDetalhesCliente(nomeCliente) {
      const cliente = clientesGlobal.find(c => c.Nome === nomeCliente);
      if (cliente) {
        sessionStorage.setItem('clienteSelecionado', JSON.stringify(cliente));
        localStorage.setItem('clienteSelecionado', JSON.stringify(cliente));
        window.location.href = 'pagamentos-detalhes.html';
      }
    }

    function aplicarFiltros() {
      const nome = (document.getElementById('filtroNome').value || '').toLowerCase();
      const dataVendaDe = document.getElementById('filtroDataVendaDe').value;
      const dataVendaAte = document.getElementById('filtroDataVendaAte').value;
      const dataCadastroDe = document.getElementById('filtroDataCadastroDe').value;
      const dataCadastroAte = document.getElementById('filtroDataCadastroAte').value;
      const minVendas = parseInt(document.getElementById('filtroMinVendas').value) || 0;
      const statusPagamento = document.getElementById('filtroStatusPagamento').value;

      clientesFiltrados = clientesGlobal.filter(cliente => {
        // Filtro por nome
        if (nome && !cliente.Nome.toLowerCase().includes(nome)) return false;

        // Filtro por mín. de vendas
        if (cliente.Vendas && cliente.Vendas.length < minVendas) return false;

        // Filtro por data de venda
        if ((dataVendaDe || dataVendaAte) && cliente.Vendas) {
          const temVendaNoPeriodo = cliente.Vendas.some(v => {
            const dataVenda = new Date(v.DataVenda);
            if (dataVendaDe && dataVenda < new Date(dataVendaDe)) return false;
            if (dataVendaAte && dataVenda > new Date(dataVendaAte)) return false;
            return true;
          });
          if (!temVendaNoPeriodo) return false;
        }

        // Filtro por data de cadastro
        if (dataCadastroDe || dataCadastroAte) {
          const dataCadastro = new Date(cliente.DataCadastro || '');
          if (dataCadastroDe && dataCadastro < new Date(dataCadastroDe)) return false;
          if (dataCadastroAte && dataCadastro > new Date(dataCadastroAte)) return false;
        }

        // Filtro por status de pagamento
        if (statusPagamento && cliente.Vendas) {
          let temStatus = false;
          const hoje = new Date();
          hoje.setHours(0, 0, 0, 0);

          cliente.Vendas.forEach(venda => {
            if (!venda.Parcelas) return;
            venda.Parcelas.forEach(parcela => {
              const dataVenc = new Date(parcela.DataVencimento);
              dataVenc.setHours(0, 0, 0, 0);

              if (statusPagamento === 'pago' && parcela.Pago) temStatus = true;
              if (statusPagamento === 'pendente' && !parcela.Pago && dataVenc > hoje) temStatus = true;
              if (statusPagamento === 'vencido' && !parcela.Pago && dataVenc <= hoje) temStatus = true;
            });
          });
          if (!temStatus) return false;
        }

        return true;
      });

      renderizarTabela();
    }

    function limparFiltros() {
      document.getElementById('filtroNome').value = '';
      document.getElementById('filtroDataVendaDe').value = '';
      document.getElementById('filtroDataVendaAte').value = '';
      document.getElementById('filtroDataCadastroDe').value = '';
      document.getElementById('filtroDataCadastroAte').value = '';
      document.getElementById('filtroMinVendas').value = '';
      document.getElementById('filtroStatusPagamento').value = '';
      
      clientesFiltrados = [...clientesGlobal];
      renderizarTabela();
    }

    // Carregar ao iniciar
    carregarPagamentos();
  </script>
</body>
</html>
